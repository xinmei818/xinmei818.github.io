<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>多维人格深度测试 | 8属性完整分析</title>
<style>
* {
 * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

body {
  background: linear-gradient(160deg, #1a103d, #241658);
  padding: 20px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
}

/* 独立的星星背景层，比伪元素兼容性更好 */
.stars-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none; /* 不影响点击 */
  /* 星星尺寸全部放大 2 倍 */
  background-image: 
    radial-gradient(circle at 5% 12%, #ffd966 3px, transparent 3px),
    radial-gradient(circle at 12% 45%, #fff380 3.4px, transparent 3.4px),
    radial-gradient(circle at 22% 78%, #ffd966 3px, transparent 3px),
    radial-gradient(circle at 35% 22%, #fff380 3.3px, transparent 3.3px),
    radial-gradient(circle at 48% 65%, #ffd966 3px, transparent 3px),
    radial-gradient(circle at 55% 8%, #fff380 3.5px, transparent 3.5px),
    radial-gradient(circle at 68% 38%, #ffd966 3.2px, transparent 3.2px),
    radial-gradient(circle at 75% 72%, #fff380 3px, transparent 3px),
    radial-gradient(circle at 88% 18%, #ffd966 3.4px, transparent 3.4px),
    radial-gradient(circle at 95% 55%, #fff380 3.2px, transparent 3.2px),
    radial-gradient(circle at 18% 28%, #ffd966 3px, transparent 3px),
    radial-gradient(circle at 42% 82%, #fff380 3.3px, transparent 3.3px),
    radial-gradient(circle at 62% 52%, #ffd966 3.1px, transparent 3.1px),
    radial-gradient(circle at 82% 85%, #fff380 3px, transparent 3px);
  background-size: 100% 100%;
  /* 动画从70s改成20s，速度更快 */
  animation: starMove 20s linear infinite;
  opacity: 1; /* 去掉透明度，星星更亮 */
  z-index: 0; /* 放在卡片下面 */
}

/* 星星动画：速度更快，飘动幅度更大 */
@keyframes starMove {
  0% {
    transform: translateY(0) translateX(0);
  }
  25% {
    transform: translateY(-30px) translateX(15px);
  }
  50% {
    transform: translateY(-15px) translateX(-15px);
  }
  75% {
    transform: translateY(-45px) translateX(10px);
  }
  100% {
    transform: translateY(0) translateX(0);
  }
}

.main {
  position: relative;
  z-index: 1; /* 卡片层级比星星高，不会被挡住 */
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(0px);
  border-radius: 40px;
  box-shadow: 0 20px 45px -12px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(59,130,246,0.2);
  overflow: hidden;
  transition: all 0.2s ease;
}

.header {
  background: linear-gradient(120deg, #002fa7, #3b82f6);
  color: white;
  padding: 32px 28px;
  text-align: center;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 10px;
}

.header p {
  font-size: 15px;
  opacity: 0.9;
  font-weight: 400;
}

.progress-bar {
  height: 6px;
  background: #e2e8f0;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6366f1, #a855f7);
  width: 0%;
  transition: width 0.25s ease;
}

.count {
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: #64748b;
  background: #f8fafc;
  padding: 10px 0 6px;
  letter-spacing: 0.3px;
}

.question-box {
  padding: 32px 28px;
}

.question-title {
  font-size: 22px;
  font-weight: 600;
  line-height: 1.45;
  margin-bottom: 28px;
  color: #0f172a;
}

.choices {
  display: grid;
  gap: 12px;
}

.choice {
  padding: 14px 20px;
  border: 1.5px solid #e2e8f0;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  background: #ffffff;
  font-size: 16px;
  font-weight: 500;
  color: #1e293b;
  box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}

.choice:hover {
  border-color: #818cf8;
  background: #f5f3ff;
  transform: translateY(-1px);
}

.choice.active {
  border-color: #6366f1;
  background: #eef2ff;
  color: #4338ca;
  font-weight: 600;
  box-shadow: 0 4px 8px rgba(99,102,241,0.12);
}

.nav {
  padding: 8px 28px 32px;
  display: flex;
  gap: 14px;
}

button {
  padding: 14px 20px;
  border: none;
  border-radius: 40px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  flex: 1;
  transition: 0.2s;
}

.btn-back {
  background: #f1f5f9;
  color: #334155;
}

.btn-back:hover:not(:disabled) {
  background: #e2e8f0;
}

.btn-back:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-next {
  background: #6366f1;
  color: white;
  box-shadow: 0 2px 6px rgba(99,102,241,0.3);
}

.btn-next:hover {
  background: #4f46e5;
  transform: translateY(-1px);
}

.btn-submit {
  background: #a855f7;
  color: white;
  box-shadow: 0 2px 8px rgba(168,85,247,0.3);
}

.btn-submit:hover {
  background: #9333ea;
}

.result-page {
  display: none;
  padding: 32px 28px;
}

.result-type {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.result-name {
  font-size: 26px;
  font-weight: 700;
  color: #0f172a;
  margin-bottom: 16px;
  border-left: 5px solid #a855f7;
  padding-left: 18px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 20px 0 18px;
}

.tag {
  background: #f1f5f9;
  padding: 6px 16px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 500;
  color: #334155;
}

.dimensions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 28px 0 24px;
}

.dimension {
  background: #f8fafc;
  padding: 18px 16px;
  border-radius: 24px;
  border: 1px solid #eef2ff;
}

.dim-title {
  font-weight: 700;
  color: #4c1d95;
  font-size: 16px;
  margin-bottom: 10px;
}

.dim-score {
  font-size: 13px;
  color: #475569;
  background: #ffffffcc;
  display: inline-block;
  padding: 4px 12px;
  border-radius: 40px;
  margin-top: 8px;
}

.result-desc {
  line-height: 1.7;
  font-size: 16px;
  color: #1e293b;
  background: #fefce8;
  padding: 20px 20px;
  border-radius: 28px;
  margin-top: 18px;
  border: 1px solid #fef08a;
}

.restart-btn {
  margin-top: 28px;
  background: #eef2ff;
  color: #4338ca;
  font-weight: 600;
  border: none;
  width: 100%;
  padding: 14px;
  border-radius: 40px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

.restart-btn:hover {
  background: #e0e7ff;
}

@media (max-width: 550px) {
  body { padding: 12px; }
  .question-box { padding: 24px 20px; }
  .question-title { font-size: 20px; }
  .dimensions { grid-template-columns: 1fr; }
  .result-name { font-size: 22px; }
}
</style>
</head>
<body>
<div class="main" id="app">
  <div class="header">
    <h1>多维人格深度测试</h1>
    <p>依恋·自我·现实·自律 | 8属性精准画像</p>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="count" id="questionCounter"></div>

  <!-- 问卷区域 -->
  <div id="quizPanel">
    <div class="question-box">
      <div class="question-title" id="questionText"></div>
      <div class="choices" id="choicesContainer"></div>
    </div>
    <div class="nav">
      <button class="btn-back" id="prevBtn" disabled>◀ 上一题</button>
      <button class="btn-next" id="nextBtn">下一题 ▶</button>
    </div>
  </div>

  <!-- 结果区域 -->
  <div id="resultPanel" class="result-page" style="display: none;">
    <div class="result-type" id="resultTypeCode"></div>
    <div class="result-name" id="resultTypeName"></div>
    <div class="tags" id="resultTags"></div>
    <div class="dimensions" id="resultDimensions"></div>
    <div class="result-desc" id="resultDesc"></div>
    <button class="restart-btn" id="restartTestBtn">🔄 重新测试</button>
  </div>
</div>

<script>

  ] },
  { dim: "df", text: "我很在意别人对我的看法，会为了讨好他人委屈自己", opts: [

    { label: "中立", weights: { d:0, f:0 } }, { label: "不同意", weights: { d:0, f:1 } },

const RESULT_DB = {
  // 依恋-自我-现实-自律  (A焦虑 S安全) (D低自尊 F高自尊) (G理想 H现实) (J自律 K随性)

  "AFHK": { name: "焦虑·高自尊·现实·随性型", tags: "灵活敏锐,自信随和,现实享受", desc: "你对自己认可，处事灵活，但关系中容易担忧。喜欢按自己节奏生活，适应力强。适度关注伴侣需求，可以拥有温暖平衡的关系。" },

  "SDHJ": { name: "安全·低自尊·现实·自律型", tags: "可靠勤奋,自我批判,务实求稳", desc: "你让人感到安心，对自己要求严格，踏实肯干但低估自己。你是团队基石，学习欣赏自己的贡献，不必过度谦虚。" },
  "SDHK": { name: "安全·低自尊·现实·随性型", tags: "随和包容,缺乏野心,活在当下", desc: "你安全感足、随遇而安，但常低估自己价值。性格讨喜，满足于简单快乐。尝试小挑战可增强内在力量，发现更大可能性。" },
  "SFGJ": { name: "安全·高自尊·理想·自律型", tags: "自信笃定,理想远航,高度自律", desc: "健康的依恋，强大的自我认同，心怀星辰大海，行动力极强。你是天生的领袖与开拓者，注意偶尔放松，拥抱不完美的浪漫。" },
  "SFGK": { name: "安全·高自尊·理想·随性型", tags: "自信自由,浪漫豁达,灵感充沛", desc: "你内心安全，自信从容，理想主义却不强求，随性而有创意。活得潇洒自在，是身边人的小太阳。适当增加条理性会让才华更持久。" },
  "SFHJ": { name: "安全·高自尊·现实·自律型", tags: "通透实干,稳重强大,目标王者", desc: "情绪稳定，认知清晰，务实自律，你是现实世界里的顶级选手。既能仰望星空又能脚踏实地，注意别太紧绷，享受过程。" },
  "SFHK": { name: "安全·高自尊·现实·随性型", tags: "松弛自信,豁达通透,人生玩家", desc: "你拥有最理想的人格底色：安全感充足，自我认可，现实灵活，随性自由。情绪稳定又乐观，懂得享受生活，是很多人羡慕的状态。保持好奇，感染他人。" }
};

// 辅助: 维度代码映射 (用于最终确定字母)
const DIM_KEYS = {
  as: { left: 'a', right: 's', leftCode: 'A', rightCode: 'S' },
  df: { left: 'd', right: 'f', leftCode: 'D', rightCode: 'F' },
  gh: { left: 'g', right: 'h', leftCode: 'G', rightCode: 'H' },
  jk: { left: 'j', right: 'k', leftCode: 'J', rightCode: 'K' }
};

// 全局状态
let userAnswers = new Array(QUESTIONS.length).fill(null);   // 存储每道题选择的索引
let currentIndex = 0;
let scoreMap = { a:0, s:0, d:0, f:0, g:0, h:0, j:0, k:0 };

// DOM 元素
const quizPanel = document.getElementById('quizPanel');
const resultPanel = document.getElementById('resultPanel');
const questionTextEl = document.getElementById('questionText');
const choicesContainer = document.getElementById('choicesContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressFill = document.getElementById('progressFill');
const questionCounter = document.getElementById('questionCounter');

// ========== 核心函数：根据userAnswers实时计算总分 ==========
function recalcTotalScores() {
  // 重置分数
  scoreMap = { a:0, s:0, d:0, f:0, g:0, h:0, j:0, k:0 };
  for (let i = 0; i < QUESTIONS.length; i++) {
    const selectedIdx = userAnswers[i];
    if (selectedIdx === null) continue;
    const q = QUESTIONS[i];
    const selectedOpt = q.opts[selectedIdx];
    if (!selectedOpt || !selectedOpt.weights) continue;
    const weights = selectedOpt.weights;
    for (let [attr, val] of Object.entries(weights)) {
      if (scoreMap[attr] !== undefined) scoreMap[attr] += val;
    }
  }
}

// 根据当前分数获取四维度字母组合 (A/S, D/F, G/H, J/K)
function getPersonalityCode() {
  const asCode = scoreMap.a > scoreMap.s ? 'A' : (scoreMap.s > scoreMap.a ? 'S' : (scoreMap.a === scoreMap.s ? (Math.random()<0.5 ? 'A':'S') : 'S'));
  const dfCode = scoreMap.d > scoreMap.f ? 'D' : (scoreMap.f > scoreMap.d ? 'F' : (Math.random()<0.5 ? 'D':'F'));
  const ghCode = scoreMap.g > scoreMap.h ? 'G' : (scoreMap.h > scoreMap.g ? 'H' : (Math.random()<0.5 ? 'G':'H'));
  const jkCode = scoreMap.j > scoreMap.k ? 'J' : (scoreMap.k > scoreMap.j ? 'K' : (Math.random()<0.5 ? 'J':'K'));
  return asCode + dfCode + ghCode + jkCode;
}

// 渲染当前题目 (高亮已选)
function renderCurrentQuestion() {
  const q = QUESTIONS[currentIndex];
  questionTextEl.innerText = `${currentIndex+1}. ${q.text}`;
  const selectedIdx = userAnswers[currentIndex];
  choicesContainer.innerHTML = '';
  q.opts.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'choice';
    if (selectedIdx === idx) div.classList.add('active');
    div.innerText = opt.label;
    div.addEventListener('click', () => {
      // 更新答案
      userAnswers[currentIndex] = idx;
      recalcTotalScores();    // 实时重算总分
      renderCurrentQuestion(); // 刷新高亮
      updateProgressAndCounter();
    });
    choicesContainer.appendChild(div);
  });
  updateProgressAndCounter();
  prevBtn.disabled = (currentIndex === 0);
  const isLast = currentIndex === QUESTIONS.length - 1;
  nextBtn.innerText = isLast ? "✨ 提交测试" : "下一题 →";
}

function updateProgressAndCounter() {
  const answeredCount = userAnswers.filter(a => a !== null).length;
  const percent = (answeredCount / QUESTIONS.length) * 100;
  progressFill.style.width = `${percent}%`;
  questionCounter.innerText = `${answeredCount}/${QUESTIONS.length} 已答`;
}

// 提交并展示结果
function showResult() {
  // 确保所有题目都已选 (前端强制)
  for (let i = 0; i < userAnswers.length; i++) {
    if (userAnswers[i] === null) {
      alert(`请先完成第 ${i+1} 题后再提交～`);
      currentIndex = i;
      renderCurrentQuestion();
      return false;
    }
  }
  recalcTotalScores();  // 最终总分
  const typeCode = getPersonalityCode();
  const personality = RESULT_DB[typeCode] || RESULT_DB["SFHK"]; // 兜底为安全高自尊现实随性型
  
  // 填充结果界面
  document.getElementById('resultTypeCode').innerText = `${typeCode} · 人格编码`;
  document.getElementById('resultTypeName').innerText = personality.name;
  document.getElementById('resultDesc').innerText = personality.desc;
  const tagsHtml = personality.tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('');
  document.getElementById('resultTags').innerHTML = tagsHtml;
  
  // 维度详情
  const dimsDetail = [
    { name: "依恋类型", leftScore: scoreMap.a, rightScore: scoreMap.s, leftLabel: "焦虑型(A)", rightLabel: "安全型(S)", final: scoreMap.a > scoreMap.s ? "焦虑型(A)" : (scoreMap.s > scoreMap.a ? "安全型(S)" : "平衡型") },
    { name: "自我认知", leftScore: scoreMap.d, rightScore: scoreMap.f, leftLabel: "低自尊(D)", rightLabel: "高自尊(F)", final: scoreMap.d > scoreMap.f ? "低自尊(D)" : (scoreMap.f > scoreMap.d ? "高自尊(F)" : "均衡型") },
    { name: "现实程度", leftScore: scoreMap.g, rightScore: scoreMap.h, leftLabel: "理想主义(G)", rightLabel: "现实主义(H)", final: scoreMap.g > scoreMap.h ? "理想主义(G)" : (scoreMap.h > scoreMap.g ? "现实主义(H)" : "理想与现实平衡") },
    { name: "自律程度", leftScore: scoreMap.j, rightScore: scoreMap.k, leftLabel: "自律型(J)", rightLabel: "随性型(K)", final: scoreMap.j > scoreMap.k ? "自律型(J)" : (scoreMap.k > scoreMap.j ? "随性型(K)" : "灵活中庸") }
  ];
  let dimHtml = '';
  dimsDetail.forEach(d => {
    dimHtml += `
      <div class="dimension">
        <div class="dim-title">${d.name} · ${d.final}</div>
        <div class="dim-score">${d.leftLabel} ${d.leftScore} ｜ ${d.rightLabel} ${d.rightScore}</div>
      </div>
    `;
  });
  document.getElementById('resultDimensions').innerHTML = dimHtml;
  
  // 切换显示
  quizPanel.style.display = 'none';
  resultPanel.style.display = 'block';
  return true;
}

// 重置测试 (重新开始)
function resetTest() {
  userAnswers = new Array(QUESTIONS.length).fill(null);
  currentIndex = 0;
  scoreMap = { a:0, s:0, d:0, f:0, g:0, h:0, j:0, k:0 };
  quizPanel.style.display = 'block';
  resultPanel.style.display = 'none';
  renderCurrentQuestion();
}

// 事件绑定
function bindEvents() {
  nextBtn.addEventListener('click', () => {
    // 检查当前题目是否已选
    if (userAnswers[currentIndex] === null) {
      alert("请先选择当前题目的选项～");
      return;
    }
    if (currentIndex === QUESTIONS.length - 1) {
      // 最后一题并且有答案 -> 提交
      const allDone = userAnswers.every(v => v !== null);
      if (!allDone) {
        alert("还有题目未完成，请返回作答～");
        return;
      }
      showResult();
    } else {
      currentIndex++;
      renderCurrentQuestion();
    }
  });
  
  prevBtn.addEventListener('click', () => {
    if (currentIndex > 0) {
      currentIndex--;
      renderCurrentQuestion();
    }
  });
  
  document.getElementById('restartTestBtn')?.addEventListener('click', () => {
    resetTest();
  });
}

// 初始化
function init() {
  bindEvents();
  renderCurrentQuestion();
}

init();
</script>
