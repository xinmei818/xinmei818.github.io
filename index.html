<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>尖塔之影 · 雨声中的怪物灵魂</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: #0a0c12;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
  font-family: '华文楷书', '华文行书', 'STXingkai', '楷体', 'Noto Serif SC', serif;
}

/* ========== 雨丝背景动画 ========== */
.rain-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.rain-bg span {
  position: absolute;
  width: 1.5px;
  background: rgba(180, 200, 220, 0.4);
  border-radius: 1px;
  animation: rainDrop linear infinite;
  will-change: transform;
}

@keyframes rainDrop {
  0% { transform: translateY(-120vh); opacity: 0.2; }
  15% { opacity: 0.7; }
  85% { opacity: 0.7; }
  100% { transform: translateY(120vh); opacity: 0; }
}

/* ========== 主卡片 ========== */
.main {
  position: relative;
  z-index: 2;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  background: rgba(18, 20, 28, 0.94);
  backdrop-filter: blur(4px);
  border-radius: 48px;
  box-shadow: 0 20px 45px -8px rgba(0,0,0,0.8);
  overflow: hidden;
  border: 1px solid rgba(180, 140, 80, 0.3);
}

.header {
  background: linear-gradient(135deg, #1e2a2e, #2c3e2f);
  color: #e2e0c8;
  padding: 28px 24px;
  text-align: center;
}

.header h1 {
  font-size: 26px;
  font-weight: 500;
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.header p {
  font-size: 13px;
  opacity: 0.85;
}

.progress-bar {
  height: 4px;
  background: #2f2f3a;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6b9e6b, #b8c77a);
  width: 0%;
  transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.count {
  text-align: center;
  font-size: 13px;
  font-weight: 400;
  color: #b8c77a;
  background: #1e1f28;
  padding: 8px 0 6px;
  letter-spacing: 1px;
}

.question-box {
  padding: 32px 28px;
}

.question-title {
  font-size: 20px;
  font-weight: 500;
  line-height: 1.5;
  margin-bottom: 28px;
  color: #f2e4c6;
  text-shadow: 0 1px 1px rgba(0,0,0,0.3);
}

.choices {
  display: grid;
  gap: 12px;
}

.choice {
  padding: 14px 20px;
  border: 1px solid #4a4a5a;
  border-radius: 32px;
  cursor: pointer;
  transition: all 0.2s ease;
  background: #2a2a34;
  font-size: 15px;
  font-weight: 400;
  color: #ddd0b8;
  touch-action: manipulation;
  text-align: left;
  line-height: 1.4;
}

.choice:hover {
  border-color: #8ab86a;
  background: #3a3f44;
  transform: translateY(-1px);
}

.choice.active {
  border-color: #c7e09c;
  background: #4d5a3c;
  color: #fff4e4;
  font-weight: 500;
  box-shadow: 0 4px 10px rgba(120, 150, 60, 0.25);
}

.nav {
  padding: 8px 28px 32px;
  display: flex;
  gap: 14px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 40px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  flex: 1;
  transition: 0.2s;
  font-family: inherit;
}

.btn-back {
  background: #323240;
  color: #cfc6b0;
}

.btn-back:hover:not(:disabled) {
  background: #424252;
}

.btn-back:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-next {
  background: #6b9e6b;
  color: #fff8ec;
  box-shadow: 0 2px 8px rgba(80, 120, 50, 0.4);
}

.btn-next:hover {
  background: #8ab86a;
  transform: translateY(-1px);
}

/* ========== 封面页 ========== */
.cover-page {
  position: relative;
  z-index: 2;
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
  background: rgba(20, 20, 28, 0.92);
  backdrop-filter: blur(12px);
  border-radius: 64px;
  padding: 48px 32px 56px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(140, 180, 90, 0.4);
}

.cover-title {
  font-size: 48px;
  font-weight: 500;
  color: #d8e4aa;
  letter-spacing: 6px;
  margin-bottom: 24px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

.cover-sub {
  font-size: 16px;
  color: #b8c77a;
  margin-bottom: 40px;
  border-top: 1px solid rgba(140,180,90,0.3);
  display: inline-block;
  padding-top: 14px;
}

.cover-desc {
  font-size: 15px;
  color: #d0c0a0;
  line-height: 1.8;
  margin-bottom: 48px;
  max-width: 80%;
  margin-left: auto;
  margin-right: auto;
}

.start-btn {
  background: linear-gradient(145deg, #4a6e3a, #2d4a1e);
  border: none;
  padding: 16px 48px;
  font-size: 20px;
  font-weight: 500;
  color: #fcf3e0;
  border-radius: 60px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 6px 14px rgba(0,0,0,0.4);
  font-family: inherit;
  letter-spacing: 2px;
}

.start-btn:hover {
  transform: scale(1.02);
  background: linear-gradient(145deg, #6b9e4a, #3e6b28);
}

/* ========== 结果页面 ========== */
.result-page {
  display: none;
  padding: 32px 28px;
}

.result-monster-img {
  text-align: center;
  margin-bottom: 20px;
}

.result-monster-img img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  border-radius: 20px;
  background: #2a2a34;
  padding: 8px;
}

.result-type {
  font-size: 28px;
  font-weight: 500;
  color: #d8e4aa;
  letter-spacing: 2px;
  margin-bottom: 12px;
  border-left: 3px solid #b8c77a;
  padding-left: 20px;
}

.result-name {
  font-size: 24px;
  font-weight: 500;
  color: #e2d7c0;
  margin-bottom: 16px;
  padding-left: 20px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 16px 0 20px;
  padding-left: 20px;
}

.tag {
  background: #2a2a34;
  padding: 4px 14px;
  border-radius: 30px;
  font-size: 12px;
  color: #b8c77a;
}

.result-desc {
  line-height: 1.75;
  font-size: 15px;
  color: #e2d6c2;
  background: rgba(45, 50, 35, 0.7);
  padding: 24px 24px;
  border-radius: 32px;
  margin-top: 20px;
  border: 1px solid rgba(140, 180, 90, 0.3);
  white-space: pre-wrap;
}

.restart-btn {
  margin-top: 28px;
  background: #323240;
  color: #b8c77a;
  font-weight: 500;
  width: 100%;
  padding: 12px;
  border-radius: 40px;
  cursor: pointer;
}

.restart-btn:hover {
  background: #454558;
}

@media (max-width: 550px) {
  body { padding: 12px; }
  .cover-title { font-size: 38px; letter-spacing: 4px; }
  .question-box { padding: 24px 20px; }
  .question-title { font-size: 18px; }
  .result-type { font-size: 22px; }
  .result-name { font-size: 20px; }
  .result-monster-img img { width: 70px; height: 70px; }
}
</style>
</head>
<body>
<div class="rain-bg" id="rainBg"></div>

<!-- 封面页 -->
<div class="cover-page" id="coverPage">
  <div class="cover-title">尖塔之影</div>
  <div class="cover-sub">· 雨声中的怪物灵魂 ·</div>
  <div class="cover-desc">淅淅沥沥的雨滴敲打塔顶，你听见自己的心跳和某种古老的低语。<br>选择你的本能，那只藏在影中的怪物便会睁开眼。</div>
  <button class="start-btn" id="startTestBtn">步入雨中</button>
</div>

<!-- 主测试模块 -->
<div class="main" id="app" style="display: none;">
  <div class="header">
    <h1>尖塔之影</h1>
    <p>攻击·意图·本能 | 雨声测写</p>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="count" id="questionCounter"></div>

  <div id="quizPanel">
    <div class="question-box">
      <div class="question-title" id="questionText"></div>
      <div class="choices" id="choicesContainer"></div>
    </div>
    <div class="nav">
      <button class="btn-back" id="prevBtn" disabled>◀ 回溯</button>
      <button class="btn-next" id="nextBtn">回应本能 ▶</button>
    </div>
  </div>

  <div id="resultPanel" class="result-page" style="display: none;">
    <div class="result-monster-img" id="resultMonsterImg"></div>
    <div class="result-type" id="resultTypeCode"></div>
    <div class="result-name" id="resultName"></div>
    <div class="tags" id="resultTags"></div>
    <div class="result-desc" id="resultDesc"></div>
    <button class="restart-btn" id="restartTestBtn">重回雨中</button>
  </div>
</div>

<script>
// ======================= 1. 雨丝动画（生成密集雨丝） =======================
(function initRain() {
  const container = document.getElementById('rainBg');
  if (!container) return;
  const RAIN_COUNT = 100;
  for (let i = 0; i < RAIN_COUNT; i++) {
    const drop = document.createElement('span');
    drop.style.left = Math.random() * 100 + '%';
    drop.style.height = (Math.random() * 70 + 30) + 'px';
    const duration = Math.random() * 1.2 + 0.8;
    drop.style.animationDuration = duration + 's';
    drop.style.animationDelay = Math.random() * 5 + 's';
    container.appendChild(drop);
  }
})();

// ======================= 2. 淅淅沥沥的雨声（Web Audio 纯雨声） =======================
class RainSound {
  constructor() {
    this.audioCtx = null;
    this.source = null;
    this.gainNode = null;
    this.isMuted = false;
    this.initiated = false;
  }
  async init() {
    if (this.initiated) return;
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      this.gainNode = this.audioCtx.createGain();
      this.gainNode.connect(this.audioCtx.destination);
      this.gainNode.gain.value = this.isMuted ? 0 : 0.32;
      
      // 生成雨声噪声音频（柔和的粉噪+白噪）
      const sampleRate = this.audioCtx.sampleRate;
      const bufferSize = sampleRate * 3;
      const buffer = this.audioCtx.createBuffer(1, bufferSize, sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        // 雨声特点：高频轻柔，偶尔有较重的滴落感
        let noise = (Math.random() * 2 - 1) * 0.5;
        // 模拟雨滴敲击感：随机尖峰
        if (Math.random() < 0.03) noise += (Math.random() * 0.4);
        data[i] = noise;
      }
      this.source = this.audioCtx.createBufferSource();
      this.source.buffer = buffer;
      this.source.loop = true;
      this.source.connect(this.gainNode);
      this.source.start();
      this.initiated = true;
      if (this.audioCtx.state === 'suspended') await this.audioCtx.resume();
    } catch(e) { console.warn("雨声初始化失败", e); }
  }
  async mute() { if (!this.initiated) return; this.isMuted = true; if(this.gainNode) this.gainNode.gain.linearRampToValueAtTime(0, this.audioCtx.currentTime+0.1); }
  async unmute() { if (!this.initiated) await this.init(); this.isMuted = false; if(this.gainNode && this.audioCtx) { if(this.audioCtx.state === 'suspended') await this.audioCtx.resume(); this.gainNode.gain.linearRampToValueAtTime(0.32, this.audioCtx.currentTime+0.1); } }
  toggle() { this.isMuted ? this.unmute() : this.mute(); }
}
const rainSound = new RainSound();
let soundStarted = false;
function startRainOnGesture() { if (soundStarted) return; soundStarted = true; rainSound.init().then(() => { rainSound.unmute(); }).catch(e=>console.warn); }
document.body.addEventListener('click', startRainOnGesture, { once: true });
document.body.addEventListener('touchstart', startRainOnGesture, { once: true });

// ======================= 3. 题库（完整行为选项，不再是A/B/C/D） =======================
const QUESTIONS = [
  { text: "当未知的敌人出现在你面前，你的第一反应是？", 
    opts: ["立刻咆哮着冲上去撕咬", "先躲进阴影里观察弱点", "发出古怪的叫声召唤同伴", "装作无害，等对方靠近再突袭"] },
  { text: "你如何看待这座不断变化的尖塔？",
    opts: ["它是一座牢笼，必须用暴力挣脱", "它是迷宫的谜题，需要耐心解构", "它是猎物丰饶的狩猎场", "它是旧神的尸骸，藏着禁忌知识"] },
  { text: "当你受伤流血时，你的本能是？",
    opts: ["愤怒加倍，攻击更疯狂", "暂时撤退，舔舐伤口", "假装虚弱引诱敌人", "将痛苦转化为诅咒反弹给对手"] },
  { text: "你更享受哪一种战斗方式？",
    opts: ["正面碾压，力量就是一切", "布下陷阱，让对手自投罗网", "速度与巧击，一击脱离", "操控元素或诅咒慢慢侵蚀"] },
  { text: "遇到一个落单的冒险者，你会？",
    opts: ["直接扑杀，不留活口", "尾随他，等他疲劳再动手", "发出威胁把他吓跑，不恋战", "用低语扰乱心智，让他自己崩溃"] },
  { text: "你如何看待“同伴”？",
    opts: ["只有自己最可靠", "弱者抱团才能活", "他们只是暂时利用的工具", "我保护他们，他们也替我挡刀"] },
  { text: "当战斗陷入僵局，你会？",
    opts: ["孤注一掷，全力一击", "消耗战术，拖延到对方力竭", "制造混乱然后脱身", "用诡计迫使对方犯错"] },
  { text: "你害怕死亡吗？",
    opts: ["不怕，死了也要拉垫背", "怕，所以我会更谨慎", "死亡不过是另一种形态", "我早已死过，现在只剩恨"] },
  { text: "如果获得强大的力量需要牺牲一部分理智，你愿意吗？",
    opts: ["愿意，力量就是一切", "不愿意，失去自我比死更可怕", "看情况，必要时可以妥协", "我可能早就失去理智了"] },
  { text: "你如何看待这座尖塔的顶端？",
    opts: ["那里一定有最强的猎物", "是终点，也是解脱", "藏着尖塔的心脏，摧毁它", "不该被触及的禁忌"] },
  { text: "当你的计谋被识破，你会？",
    opts: ["恼羞成怒直接硬刚", "立刻撤退另寻时机", "假装投降再反咬", "沉默不语，等待下一次机会"] },
  { text: "你记忆中最深刻的情绪是什么？",
    opts: ["愤怒", "恐惧", "孤独", "仇恨"] },
  { text: "你愿意为了保护某样东西而牺牲自己吗？",
    opts: ["绝不会", "如果是重要的人可以", "那得看值不值得", "我只会为复仇牺牲"] },
  { text: "你相信命运吗？",
    opts: ["命运就是用来砸碎的", "或许一切早已注定", "我只信自己创造的因果", "命运？那只是弱者的借口"] },
  { text: "如果有一天尖塔崩塌，你会？",
    opts: ["在废墟上咆哮，成为新的王", "寻找新的藏身处继续生存", "终于可以休息了", "无所谓，反正我无处可去"] }
];

// 怪物列表（16个，对应结果）
const MONSTERS = [
  "cultist", "slime", "nob", "sentry", "looter", "chosen", "book", "leader",
  "nemesis", "giant", "repto", "awakened", "donu", "timeeater", "heart", "byrd"
];

// 每个怪物对每个选项的倾向分（手工定义，使不同选择导向不同怪物）
// 为了代码可读，使用权重矩阵：每道题每个选项给对应怪物加分
// 简化但有效：根据选项语义分配倾向
function initScoreMap() {
  let map = {};
  for(let m of MONSTERS) map[m] = 0;
  return map;
}

// 根据选项内容决定增加哪些怪物的分数（用启发式规则）
function addWeights(scoreMap, qIndex, optIndex) {
  // 以下为人工规则，保证多样性
  if (qIndex === 0) { // 第一题：遇到敌人
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.giant += 1;
    else if (optIndex === 1) scoreMap.sentry += 2, scoreMap.repto += 1;
    else if (optIndex === 2) scoreMap.leader += 2, scoreMap.cultist += 1;
    else if (optIndex === 3) scoreMap.chosen += 2, scoreMap.book += 1;
  } else if (qIndex === 1) { // 尖塔的看法
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.awakened += 1;
    else if (optIndex === 1) scoreMap.sentry += 2, scoreMap.timeeater += 1;
    else if (optIndex === 2) scoreMap.looter += 2, scoreMap.byrd += 1;
    else if (optIndex === 3) scoreMap.book += 2, scoreMap.chosen += 1;
  } else if (qIndex === 2) { // 受伤反应
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.giant += 1;
    else if (optIndex === 1) scoreMap.slime += 2, scoreMap.sentry += 1;
    else if (optIndex === 2) scoreMap.repto += 2, scoreMap.looter += 1;
    else if (optIndex === 3) scoreMap.chosen += 2, scoreMap.nemesis += 1;
  } else if (qIndex === 3) { // 战斗方式
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.giant += 1;
    else if (optIndex === 1) scoreMap.sentry += 2, scoreMap.timeeater += 1;
    else if (optIndex === 2) scoreMap.byrd += 2, scoreMap.looter += 1;
    else if (optIndex === 3) scoreMap.book += 2, scoreMap.chosen += 1;
  } else if (qIndex === 4) { // 遇到冒险者
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.cultist += 1;
    else if (optIndex === 1) scoreMap.repto += 2, scoreMap.looter += 1;
    else if (optIndex === 2) scoreMap.sentry += 2, scoreMap.leader += 1;
    else if (optIndex === 3) scoreMap.chosen += 2, scoreMap.nemesis += 1;
  } else if (qIndex === 5) { // 同伴看法
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.heart += 1;
    else if (optIndex === 1) scoreMap.slime += 2, scoreMap.leader += 1;
    else if (optIndex === 2) scoreMap.repto += 2, scoreMap.looter += 1;
    else if (optIndex === 3) scoreMap.donu += 2, scoreMap.sentry += 1;
  } else if (qIndex === 6) { // 僵局处理
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.giant += 1;
    else if (optIndex === 1) scoreMap.timeeater += 2, scoreMap.sentry += 1;
    else if (optIndex === 2) scoreMap.byrd += 2, scoreMap.slime += 1;
    else if (optIndex === 3) scoreMap.repto += 2, scoreMap.nemesis += 1;
  } else if (qIndex === 7) { // 害怕死亡
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.awakened += 1;
    else if (optIndex === 1) scoreMap.slime += 2, scoreMap.looter += 1;
    else if (optIndex === 2) scoreMap.book += 2, scoreMap.chosen += 1;
    else if (optIndex === 3) scoreMap.nemesis += 2, scoreMap.heart += 1;
  } else if (qIndex === 8) { // 牺牲理智换力量
    if (optIndex === 0) scoreMap.cultist += 2, scoreMap.awakened += 1;
    else if (optIndex === 1) scoreMap.sentry += 2, scoreMap.timeeater += 1;
    else if (optIndex === 2) scoreMap.looter += 2, scoreMap.repto += 1;
    else if (optIndex === 3) scoreMap.chosen += 2, scoreMap.book += 1;
  } else if (qIndex === 9) { // 尖塔顶端
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.giant += 1;
    else if (optIndex === 1) scoreMap.sentry += 2, scoreMap.timeeater += 1;
    else if (optIndex === 2) scoreMap.heart += 2, scoreMap.awakened += 1;
    else if (optIndex === 3) scoreMap.book += 2, scoreMap.chosen += 1;
  } else if (qIndex === 10) { // 计谋被识破
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.giant += 1;
    else if (optIndex === 1) scoreMap.byrd += 2, scoreMap.slime += 1;
    else if (optIndex === 2) scoreMap.repto += 2, scoreMap.looter += 1;
    else if (optIndex === 3) scoreMap.nemesis += 2, scoreMap.sentry += 1;
  } else if (qIndex === 11) { // 最深刻的情绪
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.awakened += 1;
    else if (optIndex === 1) scoreMap.slime += 2, scoreMap.byrd += 1;
    else if (optIndex === 2) scoreMap.leader += 2, scoreMap.sentry += 1;
    else if (optIndex === 3) scoreMap.nemesis += 2, scoreMap.heart += 1;
  } else if (qIndex === 12) { // 牺牲自己
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.giant += 1;
    else if (optIndex === 1) scoreMap.donu += 2, scoreMap.leader += 1;
    else if (optIndex === 2) scoreMap.slime += 2, scoreMap.sentry += 1;
    else if (optIndex === 3) scoreMap.nemesis += 2, scoreMap.cultist += 1;
  } else if (qIndex === 13) { // 命运
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.awakened += 1;
    else if (optIndex === 1) scoreMap.timeeater += 2, scoreMap.sentry += 1;
    else if (optIndex === 2) scoreMap.repto += 2, scoreMap.looter += 1;
    else if (optIndex === 3) scoreMap.book += 2, scoreMap.chosen += 1;
  } else if (qIndex === 14) { // 尖塔崩塌
    if (optIndex === 0) scoreMap.nob += 2, scoreMap.giant += 1;
    else if (optIndex === 1) scoreMap.slime += 2, scoreMap.byrd += 1;
    else if (optIndex === 2) scoreMap.sentry += 2, scoreMap.timeeater += 1;
    else if (optIndex === 3) scoreMap.heart += 2, scoreMap.nemesis += 1;
  }
  // 额外给每个怪物一些随机扰动避免平局（但主要靠规则）
  return scoreMap;
}

  sentry: { name: "哨卫", desc: "你是一道沉默的关卡，矗立在所有人必经的路上。你不主动伤人，但也不会放任何人通过。你的职责就是注视，然后审判。你以为自己冷血，其实你比谁都更早看清了人类的贪婪与脆弱。你只是累了，累得不想再开口说话，只想用激光来替你说出那句——‘你不该来’。", tags: "审判·孤守·冷漠", img: "https://static.wikia.nocookie.net/slaythespire/images/3/3f/Sentry.png" },

  giant: { name: "大脑袋", desc: "你的脑袋很大，装满了千年的怨气。你每回合都在积累，等待那个一锤定音的瞬间。别人说你迟钝，其实你只是在等一个最痛快的时机——就像你等了一辈子，也没等来那句对不起。", tags: "隐忍·爆发·执念", img: "https://static.wikia.nocookie.net/slaythespire/images/a/a9/Giant_Head.png" },

  donu: { name: "甜甜圈", desc: "你是甜美的圆环，你以为自己是完美的，直到你发现八角就在身边。你们彼此依靠，也彼此束缚。你给队友加糖，也给自己加糖，甜到腻，甜到忘了苦是什么味道。可每当有人咬下你们一口，你才发现——原来糖下面，是空的。", tags: "依赖·圆满·空壳", img: "https://static.wikia.nocookie.net/slaythespire/images/5/54/Donu.png" },
  timeeater: { name: "时间吞噬者", desc: "你每隔几回合就要停下来，喘口气，然后加倍奉还。你憎恨那些试图一口气打完所有牌的人，因为你自己就是被时间一口一口吞掉的。你越活越慢，越慢越恨。可你知道吗？那些急着赶路的人，其实和你一样，都怕来不及。", tags: "沉重·报复·停滞", img: "https://static.wikia.nocookie.net/slaythespire/images/e/ec/Time_Eater.png" },
  heart: { name: "腐化之心", desc: "你是尖塔的源头，是所有痛苦的起点。你以为自己在操控一切，其实你只是最痛的那一个。你的每一次跳动都在诉说着不甘，每一个出牌都在散播诅咒。你从不离开宝座，因为离开之后，你就不知道自己是谁了。", tags: "本源·绝望·孤绝", img: "https://static.wikia.nocookie.net/slaythespire/images/2/23/Corrupt_Heart.png" },

};

// 测试状态
let answers = new Array(QUESTIONS.length).fill(null);
let currentIndex = 0;
let scoreMap = initScoreMap();

// DOM
const coverPage = document.getElementById('coverPage');
const mainApp = document.getElementById('app');
const quizPanel = document.getElementById('quizPanel');
const resultPanel = document.getElementById('resultPanel');
const questionTextEl = document.getElementById('questionText');
const choicesContainer = document.getElementById('choicesContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressFill = document.getElementById('progressFill');
const questionCounter = document.getElementById('questionCounter');

function recalcAllScores() {
  scoreMap = initScoreMap();
  for (let i = 0; i < answers.length; i++) {
    if (answers[i] !== null) {
      addWeights(scoreMap, i, answers[i]);
    }
  }
}

function getTopMonster() {
  let maxKey = MONSTERS[0];
  let maxVal = scoreMap[maxKey];
  for (let m of MONSTERS) {
    if (scoreMap[m] > maxVal) { maxVal = scoreMap[m]; maxKey = m; }
  }
  return maxKey;
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  progressFill.style.width = (answered / QUESTIONS.length) * 100 + '%';
  questionCounter.innerText = `${answered}/${QUESTIONS.length} 已答`;
}

function renderQuestion() {
  const q = QUESTIONS[currentIndex];
  questionTextEl.innerText = `${currentIndex+1}. ${q.text}`;
  const selectedIdx = answers[currentIndex];
  choicesContainer.innerHTML = '';
  q.opts.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'choice' + (selectedIdx === idx ? ' active' : '');
    div.innerText = opt;
    div.addEventListener('click', () => {
      answers[currentIndex] = idx;
      recalcAllScores();
      renderQuestion();
      updateProgress();
    });
    choicesContainer.appendChild(div);
  });
  updateProgress();
  prevBtn.disabled = (currentIndex === 0);
  nextBtn.innerText = (currentIndex === QUESTIONS.length-1) ? "✨ 浮现真身" : "下一本能 →";
}

function showResult() {
  for (let i=0; i<answers.length; i++) {
    if (answers[i] === null) {
      alert(`请先完成第 ${i+1} 题再窥视雨中影子`);
      currentIndex = i;
      renderQuestion();
      return;
    }
  }
  recalcAllScores();
  const monsterKey = getTopMonster();
  const data = MONSTER_DATA[monsterKey];
  document.getElementById('resultTypeCode').innerHTML = monsterKey.toUpperCase() + " · 雨中之影";
  document.getElementById('resultName').innerHTML = data.name;
  document.getElementById('resultDesc').innerHTML = data.desc;
  document.getElementById('resultTags').innerHTML = data.tags.split('·').map(t => `<span class="tag">${t.trim()}</span>`).join('');
  document.getElementById('resultMonsterImg').innerHTML = `<img src="${data.img}" alt="${data.name}" onerror="this.src='https://via.placeholder.com/100x100?text=${data.name}'">`;
  quizPanel.style.display = 'none';
  resultPanel.style.display = 'block';
}

function resetTest() {
  answers.fill(null);
  currentIndex = 0;
  scoreMap = initScoreMap();
  quizPanel.style.display = 'block';
  resultPanel.style.display = 'none';
  renderQuestion();
}

function bindEvents() {
  nextBtn.addEventListener('click', () => {
    if (answers[currentIndex] === null) { alert("请先选择一项"); return; }
    if (currentIndex === QUESTIONS.length-1) {
      if (answers.every(v => v !== null)) showResult();
      else alert("还有未答的题目");
    } else {
      currentIndex++;
      renderQuestion();
    }
  });
  prevBtn.addEventListener('click', () => {
    if (currentIndex > 0) { currentIndex--; renderQuestion(); }
  });
  document.getElementById('restartTestBtn').addEventListener('click', resetTest);
  document.getElementById('startTestBtn').addEventListener('click', () => {
    coverPage.style.display = 'none';
    mainApp.style.display = 'block';
    resetTest();
  });
}

bindEvents();
renderQuestion();
</script>
