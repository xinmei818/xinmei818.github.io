<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>尖塔之影 · 怪物灵魂测试</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: #0a0c12;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
  font-family: '华文楷书', '华文行书', 'STXingkai', '楷体', 'Noto Serif SC', serif;
}

/* ========== 动态背景（篝火与雾雨）========== */
.bg-ambient {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  background: radial-gradient(circle at 20% 30%, #1a1a24, #0a0c12);
  overflow: hidden;
}

/* 雾的流动 */
.fog-layer {
  position: absolute;
  top: 0;
  left: 0;
  width: 200%;
  height: 100%;
  background: repeating-linear-gradient(90deg, 
    rgba(80, 70, 60, 0.08) 0px, 
    rgba(80, 70, 60, 0.08) 2px,
    transparent 2px,
    transparent 8px);
  animation: fogDrift 24s linear infinite;
  opacity: 0.6;
}

@keyframes fogDrift {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* 零星火光粒子 */
.firefly {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #ffaa66;
  border-radius: 50%;
  opacity: 0;
  animation: flicker 4s ease-in-out infinite;
}

@keyframes flicker {
  0% { opacity: 0; transform: translateY(0) scale(0.5); }
  20% { opacity: 0.8; transform: translateY(-20px) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(0.2); }
}

/* ========== 主卡片 ========== */
.main {
  position: relative;
  z-index: 2;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  background: rgba(18, 20, 28, 0.94);
  backdrop-filter: blur(4px);
  border-radius: 48px;
  box-shadow: 0 20px 45px -8px rgba(0,0,0,0.8);
  overflow: hidden;
  border: 1px solid rgba(180, 140, 80, 0.3);
}

.header {
  background: linear-gradient(135deg, #3d2a1a, #5c3e24);
  color: #f2e4c6;
  padding: 28px 24px;
  text-align: center;
}

.header h1 {
  font-size: 26px;
  font-weight: 500;
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.header p {
  font-size: 13px;
  opacity: 0.85;
}

.progress-bar {
  height: 4px;
  background: #2f2f3a;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #b87c3a, #e6af6e);
  width: 0%;
  transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.count {
  text-align: center;
  font-size: 13px;
  font-weight: 400;
  color: #c0aa7a;
  background: #1e1f28;
  padding: 8px 0 6px;
  letter-spacing: 1px;
}

.question-box {
  padding: 32px 28px;
}

.question-title {
  font-size: 20px;
  font-weight: 500;
  line-height: 1.5;
  margin-bottom: 28px;
  color: #f2e4c6;
  text-shadow: 0 1px 1px rgba(0,0,0,0.3);
}

.choices {
  display: grid;
  gap: 12px;
}

.choice {
  padding: 14px 20px;
  border: 1px solid #4a4a5a;
  border-radius: 32px;
  cursor: pointer;
  transition: all 0.2s ease;
  background: #2a2a34;
  font-size: 15px;
  font-weight: 400;
  color: #ddd0b8;
  touch-action: manipulation;
  text-align: left;
}

.choice:hover {
  border-color: #b87c3a;
  background: #3a3540;
  transform: translateY(-1px);
}

.choice.active {
  border-color: #e6af6e;
  background: #4d3e2c;
  color: #fff4e4;
  font-weight: 500;
  box-shadow: 0 4px 10px rgba(180, 120, 50, 0.25);
}

.nav {
  padding: 8px 28px 32px;
  display: flex;
  gap: 14px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 40px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  flex: 1;
  transition: 0.2s;
  font-family: inherit;
}

.btn-back {
  background: #323240;
  color: #cfc6b0;
}

.btn-back:hover:not(:disabled) {
  background: #424252;
}

.btn-back:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-next {
  background: #b87c3a;
  color: #fff8ec;
  box-shadow: 0 2px 8px rgba(140, 80, 30, 0.4);
}

.btn-next:hover {
  background: #d49448;
  transform: translateY(-1px);
}

/* ========== 封面页 ========== */
.cover-page {
  position: relative;
  z-index: 2;
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
  background: rgba(20, 20, 28, 0.92);
  backdrop-filter: blur(12px);
  border-radius: 64px;
  padding: 48px 32px 56px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(180, 130, 70, 0.4);
}

.cover-title {
  font-size: 48px;
  font-weight: 500;
  color: #e6cf9e;
  letter-spacing: 6px;
  margin-bottom: 24px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

.cover-sub {
  font-size: 16px;
  color: #b89a6a;
  margin-bottom: 40px;
  border-top: 1px solid rgba(180,130,70,0.3);
  display: inline-block;
  padding-top: 14px;
}

.cover-desc {
  font-size: 15px;
  color: #d0c0a0;
  line-height: 1.8;
  margin-bottom: 48px;
  max-width: 80%;
  margin-left: auto;
  margin-right: auto;
}

.start-btn {
  background: linear-gradient(145deg, #7f5e38, #5a3e22);
  border: none;
  padding: 16px 48px;
  font-size: 20px;
  font-weight: 500;
  color: #fcf3e0;
  border-radius: 60px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 6px 14px rgba(0,0,0,0.4);
  font-family: inherit;
  letter-spacing: 2px;
}

.start-btn:hover {
  transform: scale(1.02);
  background: linear-gradient(145deg, #9b764a, #6e4e2c);
}

/* ========== 结果页面（怪物人格） ========== */
.result-page {
  display: none;
  padding: 32px 28px;
}

.result-monster-img {
  text-align: center;
  margin-bottom: 20px;
}

.result-monster-img img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  border-radius: 20px;
}

.result-type {
  font-size: 28px;
  font-weight: 500;
  color: #e6cf9e;
  letter-spacing: 2px;
  margin-bottom: 12px;
  border-left: 3px solid #c9af7b;
  padding-left: 20px;
}

.result-name {
  font-size: 24px;
  font-weight: 500;
  color: #e2d7c0;
  margin-bottom: 16px;
  padding-left: 20px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 16px 0 20px;
  padding-left: 20px;
}

.tag {
  background: #2a2a34;
  padding: 4px 14px;
  border-radius: 30px;
  font-size: 12px;
  color: #c9af7b;
}

.result-desc {
  line-height: 1.75;
  font-size: 15px;
  color: #e2d6c2;
  background: rgba(45, 40, 35, 0.7);
  padding: 24px 24px;
  border-radius: 32px;
  margin-top: 20px;
  border: 1px solid rgba(200, 160, 100, 0.3);
  white-space: pre-wrap;
}

.restart-btn {
  margin-top: 28px;
  background: #323240;
  color: #d4be93;
  font-weight: 500;
  width: 100%;
  padding: 12px;
  border-radius: 40px;
  cursor: pointer;
}

.restart-btn:hover {
  background: #454558;
}

/* 移动端适配 */
@media (max-width: 550px) {
  body { padding: 12px; }
  .cover-title { font-size: 38px; letter-spacing: 4px; }
  .question-box { padding: 24px 20px; }
  .question-title { font-size: 18px; }
  .result-type { font-size: 22px; }
  .result-name { font-size: 20px; }
  .result-monster-img img { width: 70px; height: 70px; }
}
</style>
</head>

<script>
// ======================= 环境音效：轻柔篝火+雾雨 =======================
class AmbientSound {
  constructor() {
    this.audioCtx = null;
    this.source = null;
    this.gainNode = null;
    this.isPlaying = false;
    this.isMuted = false;
    this.initiated = false;
  }
  async init() {
    if (this.initiated) return;
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      this.gainNode = this.audioCtx.createGain();
      this.gainNode.connect(this.audioCtx.destination);
      this.gainNode.gain.value = this.isMuted ? 0 : 0.28;
      // 生成柔和的白噪音 + 轻微波动模拟篝火与细雨
      const sampleRate = this.audioCtx.sampleRate;
      const bufferSize = sampleRate * 4;
      const buffer = this.audioCtx.createBuffer(1, bufferSize, sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        let noise = (Math.random() * 2 - 1) * 0.55;
        // 低频篝火噼啪感
        if (Math.random() < 0.02) noise += (Math.random() * 0.3);
        data[i] = noise;
      }
      this.source = this.audioCtx.createBufferSource();
      this.source.buffer = buffer;
      this.source.loop = true;
      this.source.connect(this.gainNode);
      this.source.start();
      this.initiated = true;
      if (this.audioCtx.state === 'suspended') await this.audioCtx.resume();
      this.isPlaying = true;
    } catch(e) { console.warn("环境音初始化失败", e); }
  }
  async mute() { if (!this.initiated) return; this.isMuted = true; if(this.gainNode) this.gainNode.gain.linearRampToValueAtTime(0, this.audioCtx.currentTime+0.1); }
  async unmute() { if (!this.initiated) await this.init(); this.isMuted = false; if(this.gainNode && this.audioCtx) { if(this.audioCtx.state === 'suspended') await this.audioCtx.resume(); this.gainNode.gain.linearRampToValueAtTime(0.28, this.audioCtx.currentTime+0.1); } }
  toggle() { this.isMuted ? this.unmute() : this.mute(); }
}
const ambient = new AmbientSound();
let soundStarted = false;
function startSoundOnGesture() { if (soundStarted) return; soundStarted = true; ambient.init().then(() => { ambient.unmute(); }).catch(e=>console.warn); }
document.body.addEventListener('click', startSoundOnGesture, { once: true });
document.body.addEventListener('touchstart', startSoundOnGesture, { once: true });

// 背景火光粒子
(function addFireflies() {
  const bg = document.querySelector('.bg-ambient');
  if (!bg) return;
  for (let i = 0; i < 40; i++) {
    const fly = document.createElement('div');
    fly.className = 'firefly';
    fly.style.left = Math.random() * 100 + '%';
    fly.style.top = Math.random() * 100 + '%';
    fly.style.animationDelay = Math.random() * 6 + 's';
    fly.style.animationDuration = 3 + Math.random() * 4 + 's';
    bg.appendChild(fly);
  }
})();

// ======================= 16种怪物人格结果 =======================
const MONSTER_RESULTS = {
  cultist: { name: "邪教徒", desc: "你是尖塔最底层的信徒，穿着破旧的长袍，日夜低语着无人能懂的祈祷。你以为自己是在追寻信仰，其实只是在填补内心的空洞。你渴望被某股力量接纳，哪怕那力量终将吞噬你。每当有人路过，你都会抬起头，眼里燃烧着卑微而炽烈的期待——他们会不会是那个能听懂你呓语的人？", tags: "虔诚·卑微·回声", img: "https://static.wikia.nocookie.net/slaythespire/images/5/5a/Cultist.png" },
  slime: { name: "史莱姆", desc: "你是一滩柔软的流体，没有固定的形状，也没有尖锐的棱角。你可以分裂自己，把痛苦分摊给每一个微小的分身。你不喜欢冲突，但一旦被挤压，就会用粘液黏住那些试图伤害你的人。其实你很清楚，你不是没有骨头，你只是把所有骨头都溶进了湿润的温柔里。", tags: "分裂·柔软·适应", img: "https://static.wikia.nocookie.net/slaythespire/images/6/64/Acid_Slime_M.png" },
  nob: { name: "地精大块头", desc: "你的愤怒永远写在脸上，像一面没有遮挡的鼓皮。你不懂阴谋，也不屑伪装。每一拳都带着咆哮，每一击都拼尽全力。别人觉得你粗鲁，但你只是讨厌拐弯抹角——如果这个世界想伤害你，你就先把它砸碎。可有时候，夜深人静时，你也会摸摸自己发红的拳头，疑惑那股火到底烧给谁看。", tags: "暴怒·直率·野蛮", img: "https://static.wikia.nocookie.net/slaythespire/images/8/88/Gremlin_Nob.png" },
  sentry: { name: "哨卫", desc: "你是一道沉默的关卡，矗立在所有人必经的路上。你不主动伤人，但也不会放任何人通过。你的职责就是注视，然后审判。你以为自己冷血，其实你比谁都更早看清了人类的贪婪与脆弱。你只是累了，累得不想再开口说话，只想用激光来替你说出那句——‘你不该来’。", tags: "审判·孤守·冷漠", img: "https://static.wikia.nocookie.net/slaythespire/images/3/3f/Sentry.png" },
  looter: { name: "掠夺者", desc: "你总是在别人最脆弱的时候出现，像一只躲在暗处的乌鸦。你偷走的不只是金币，还有他们残存的希望。你告诉自己这个世界本来就是弱肉强食，可每当数着赃物时，你心里总有一个很小的声音在问：‘如果我也被抢过一次，还会变成这样吗？’", tags: "狡黠·投机·愧疚", img: "https://static.wikia.nocookie.net/slaythespire/images/4/43/Looter.png" },
  chosen: { name: "被拣选者", desc: "你曾经也是人，只是选择了更古老的秘法。你的灵魂里住着一团紫色的火焰，它赋予你力量，也一点点灼烧你的记忆。你现在分不清那些低语是自己的还是邪神的。但你不会回头——因为回头就什么都没有了，而往前走，至少还有痛。", tags: "神秘·献祭·执迷", img: "https://static.wikia.nocookie.net/slaythespire/images/6/6b/Chosen.png" },
  book: { name: "扎人的书", desc: "你是被封印的知识，每一页都刻着带血的文字。你不说话，但每个翻开你的人都会被无数尖刺扎伤。你以为自己是在保护那些秘密，其实你只是害怕有人读懂你之后，发现你其实什么都没写。", tags: "禁断·自毁·孤独", img: "https://static.wikia.nocookie.net/slaythespire/images/8/8b/Book_of_Stabbing.png" },
  leader: { name: "地精首领", desc: "你站在一群混乱的小地精中间，假装自己有条不紊。你指挥他们攻击，也替他们承受伤害。你以为自己是领袖，其实你比任何人都孤独——因为没有人看见你头上的王冠是铁铸的，重得让你抬不起头。", tags: "担当·疲惫·伪装", img: "https://static.wikia.nocookie.net/slaythespire/images/6/6a/Gremlin_Leader.png" },
  nemesis: { name: "天罚", desc: "你是因果律的化身，每一击都带着‘你活该’的烙印。你不恨任何人，只是无法容忍罪恶被遗忘。你挥舞着无形的镰刀，却连自己的影子都砍不断。有时候你也会想，如果有人能承受住你的审判，你是不是就可以退休了？", tags: "审判·宿命·孤高", img: "https://static.wikia.nocookie.net/slaythespire/images/9/9f/Nemesis.png" },
  giant: { name: "大脑袋", desc: "你的脑袋很大，装满了千年的怨气。你每回合都在积累，等待那个一锤定音的瞬间。别人说你迟钝，其实你只是在等一个最痛快的时机——就像你等了一辈子，也没等来那句对不起。", tags: "隐忍·爆发·执念", img: "https://static.wikia.nocookie.net/slaythespire/images/a/a9/Giant_Head.png" },
  repto: { name: "拜蛇术士", desc: "你躲在暗处，操弄着两条匕首般的毒蛇。你不亲自出手，但每一条蛇都是你的延伸。你享受猎物在猜疑中倒下，因为你太清楚——正面冲突总是太痛了，而背后，什么都不会看见。", tags: "诡诈·操控·多疑", img: "https://static.wikia.nocookie.net/slaythespire/images/d/d3/Reptomancer.png" },
  awakened: { name: "觉醒者", desc: "你死过一次，然后带着更深的怒火回来了。你以为觉醒就是看透一切，结果只是看清了自己有多恨。你杀死那些弱小的信徒，把他们当成过去的自己。可每当战斗结束，你总会愣住——你究竟是在反抗命运，还是成为了它最忠实的奴仆？", tags: "重生·悲愤·虚无", img: "https://static.wikia.nocookie.net/slaythespire/images/a/a9/Awakened_One.png" },
  donu: { name: "甜甜圈", desc: "你是甜美的圆环，你以为自己是完美的，直到你发现八角就在身边。你们彼此依靠，也彼此束缚。你给队友加糖，也给自己加糖，甜到腻，甜到忘了苦是什么味道。可每当有人咬下你们一口，你才发现——原来糖下面，是空的。", tags: "依赖·圆满·空壳", img: "https://static.wikia.nocookie.net/slaythespire/images/5/54/Donu.png" },
  timeeater: { name: "时间吞噬者", desc: "你每隔几回合就要停下来，喘口气，然后加倍奉还。你憎恨那些试图一口气打完所有牌的人，因为你自己就是被时间一口一口吞掉的。你越活越慢，越慢越恨。可你知道吗？那些急着赶路的人，其实和你一样，都怕来不及。", tags: "沉重·报复·停滞", img: "https://static.wikia.nocookie.net/slaythespire/images/e/ec/Time_Eater.png" },
  heart: { name: "腐化之心", desc: "你是尖塔的源头，是所有痛苦的起点。你以为自己在操控一切，其实你只是最痛的那一个。你的每一次跳动都在诉说着不甘，每一个出牌都在散播诅咒。你从不离开宝座，因为离开之后，你就不知道自己是谁了。", tags: "本源·绝望·孤绝", img: "https://static.wikia.nocookie.net/slaythespire/images/2/23/Corrupt_Heart.png" },
  byrd: { name: "异鸟", desc: "你总是在空中盘旋，不愿落地。你以为自己看得更远，其实只是不敢着陆。你攻击一次就飞走，再回头，再飞走。你以为自己在戏耍敌人，其实你只是怕——怕一旦停下来，就再也没有力气飞了。", tags: "轻盈·逃避·徘徊", img: "https://static.wikia.nocookie.net/slaythespire/images/0/0b/Byrd.png" }
};

// 简化版计分与匹配
let answers = new Array(QUESTIONS.length).fill(null);
let current = 0;
let scoreMap = { cultist:0, slime:0, nob:0, sentry:0, looter:0, chosen:0, book:0, leader:0, nemesis:0, giant:0, repto:0, awakened:0, donu:0, timeeater:0, heart:0, byrd:0 };

const quizPanel = document.getElementById('quizPanel');
const resultPanel = document.getElementById('resultPanel');
const questionText = document.getElementById('questionText');
const choicesContainer = document.getElementById('choicesContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressFill = document.getElementById('progressFill');
const questionCounter = document.getElementById('questionCounter');

function recalcScore() {
  scoreMap = { cultist:0, slime:0, nob:0, sentry:0, looter:0, chosen:0, book:0, leader:0, nemesis:0, giant:0, repto:0, awakened:0, donu:0, timeeater:0, heart:0, byrd:0 };
  for(let i=0; i<QUESTIONS.length; i++) {
    let idx = answers[i];
    if(idx===null) continue;
    let w = QUESTIONS[i].weights;
    if(w) {
      let keys = Object.keys(w);
      if(keys.length>0 && idx<keys.length) {
        let key = keys[idx];
        if(scoreMap[key]!==undefined) scoreMap[key] += w[key];
      }
    }
  }
}

function getMonsterKey() {
  let maxKey = 'cultist';
  let maxVal = 0;
  for(let k in scoreMap) {
    if(scoreMap[k] > maxVal) { maxVal = scoreMap[k]; maxKey = k; }
  }
  return maxKey;
}

function updateProgress() {
  let answered = answers.filter(a=>a!==null).length;
  progressFill.style.width = (answered/QUESTIONS.length)*100+'%';
  questionCounter.innerText = `${answered}/${QUESTIONS.length} 已答`;
}

function renderQuestion() {
  let q = QUESTIONS[current];
  questionText.innerText = `${current+1}. ${q.text}`;
  let selected = answers[current];
  choicesContainer.innerHTML = '';
  let opts = ["选项A", "选项B", "选项C", "选项D"];
  for(let i=0; i<4; i++) {
    let div = document.createElement('div');
    div.className = 'choice' + (selected===i ? ' active' : '');
    div.innerText = opts[i];
    div.addEventListener('click', ()=>{
      answers[current] = i;
      recalcScore();
      renderQuestion();
      updateProgress();
    });
    choicesContainer.appendChild(div);
  }
  updateProgress();
  prevBtn.disabled = (current===0);
  nextBtn.innerText = (current===QUESTIONS.length-1) ? "✨ 窥见真身" : "下一意图 →";
}

function showResult() {
  for(let i=0;i<answers.length;i++) if(answers[i]===null) { alert(`请完成第 ${i+1} 题`); current=i; renderQuestion(); return; }
  recalcScore();
  let key = getMonsterKey();
  let data = MONSTER_RESULTS[key];
  if(!data) data = MONSTER_RESULTS.cultist;
  document.getElementById('resultTypeCode').innerText = key.toUpperCase() + " · 尖塔之魂";
  document.getElementById('resultName').innerText = data.name;
  document.getElementById('resultDesc').innerText = data.desc;
  document.getElementById('resultTags').innerHTML = data.tags.split('·').map(t=>`<span class="tag">${t.trim()}</span>`).join('');
  document.getElementById('resultMonsterImg').innerHTML = `<img src="${data.img}" alt="${data.name}" onerror="this.src='https://via.placeholder.com/100x100?text=${data.name}'">`;
  quizPanel.style.display = 'none';
  resultPanel.style.display = 'block';
}

function resetTest() {
  answers.fill(null);
  current = 0;
  scoreMap = { cultist:0, slime:0, nob:0, sentry:0, looter:0, chosen:0, book:0, leader:0, nemesis:0, giant:0, repto:0, awakened:0, donu:0, timeeater:0, heart:0, byrd:0 };
  quizPanel.style.display = 'block';
  resultPanel.style.display = 'none';
  renderQuestion();
}

function bindEvents() {
  nextBtn.addEventListener('click',()=>{
    if(answers[current]===null) { alert("请先选择一项"); return; }
    if(current===QUESTIONS.length-1) { if(answers.every(v=>v!==null)) showResult(); else alert("还有未答"); }
    else { current++; renderQuestion(); }
  });
  prevBtn.addEventListener('click',()=>{ if(current>0){ current--; renderQuestion(); } });
  document.getElementById('restartTestBtn').addEventListener('click',resetTest);
  document.getElementById('startTestBtn').addEventListener('click',()=>{
    document.getElementById('coverPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    resetTest();
  });
}
bindEvents();
renderQuestion();
</script>
