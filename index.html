<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: #0a0c12;
  padding: 20px;

.rain-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.rain-bg span {
  position: absolute;
  width: 1.5px;
  background: rgba(180, 200, 220, 0.45);
  border-radius: 1px;
  animation: rainDrop linear infinite;
}

@keyframes rainDrop {
  0% { transform: translateY(-120vh); opacity: 0.2; }
  15% { opacity: 0.7; }
  85% { opacity: 0.7; }
  100% { transform: translateY(120vh); opacity: 0; }
}

.main {
  position: relative;
  z-index: 2;
  max-width: 700px;
  width: 100%;
  margin: 0 auto;
  background: rgba(18, 20, 28, 0.94);

  border-radius: 48px;

  border: 1px solid rgba(180, 140, 80, 0.3);
}

.count {

<script>
// 雨丝动画
(function initRain() {
  const container = document.getElementById('rainBg');
  if (!container) return;
  for (let i = 0; i < 120; i++) {
    const drop = document.createElement('span');
    drop.style.left = Math.random() * 100 + '%';
    drop.style.height = (Math.random() * 70 + 30) + 'px';
    drop.style.animationDuration = (Math.random() * 1.2 + 0.8) + 's';
    drop.style.animationDelay = (Math.random() * 5) + 's';
    container.appendChild(drop);
  }
})();

// 雨声
class RainSound {
  constructor() { this.audioCtx = null; this.source = null; this.gainNode = null; this.isMuted = false; this.initiated = false; }
  async init() {
    if (this.initiated) return;
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      this.gainNode = this.audioCtx.createGain();
      this.gainNode.connect(this.audioCtx.destination);
      this.gainNode.gain.value = this.isMuted ? 0 : 0.28;
      const sampleRate = this.audioCtx.sampleRate;
      const bufferSize = sampleRate * 3;
      const buffer = this.audioCtx.createBuffer(1, bufferSize, sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        let noise = (Math.random() * 2 - 1) * 0.55;
        if (Math.random() < 0.04) noise += (Math.random() * 0.35);
        data[i] = noise;
      }
      this.source = this.audioCtx.createBufferSource();
      this.source.buffer = buffer;
      this.source.loop = true;
      this.source.connect(this.gainNode);
      this.source.start();
      this.initiated = true;
      if (this.audioCtx.state === 'suspended') await this.audioCtx.resume();
    } catch(e) { console.warn(e); }
  }
  async unmute() { if (!this.initiated) await this.init(); this.isMuted = false; if(this.gainNode && this.audioCtx) { if(this.audioCtx.state === 'suspended') await this.audioCtx.resume(); this.gainNode.gain.linearRampToValueAtTime(0.28, this.audioCtx.currentTime+0.1); } }
}
const rainSound = new RainSound();
let soundStarted = false;
function startRain() { if (soundStarted) return; soundStarted = true; rainSound.unmute().catch(e=>console.warn); }
document.body.addEventListener('click', startRain, { once: true });
document.body.addEventListener('touchstart', startRain, { once: true });

// ======================= 32个经典怪物（杀戮尖塔1代为主） =======================
const MONSTERS = [
  "邪教徒", "酸液史莱姆", "大史莱姆", "地精大块头", "哨卫", "掠夺者", "被拣选者", "扎人的书",
  "地精首领", "天罚", "大脑袋", "拜蛇术士", "觉醒者", "甜甜圈", "八角", "时间吞噬者",
  "腐化之心", "异鸟", "蛇眼术士", "荆棘球", "蘑菇怪", "熊", "盗贼", "百夫长",
  "神秘法师", "扭曲团块", "暗夜精怪", "颚虫", "甲壳寄生虫", "真菌兽", "球形守卫", "奴隶贩子"
];

// 每个怪物的独立描述（长文本，符合性格）
const DESCRIPTIONS = {
  "邪教徒": "你是尖塔最底层的信徒，穿着破旧的长袍，日夜低语着无人能懂的祈祷。你以为自己是在追寻信仰，其实只是在填补内心的空洞。你渴望被某股力量接纳，哪怕那力量终将吞噬你。雨声中，你听见自己颤抖的声音——那不是祈祷，是求救。",
  "酸液史莱姆": "你是一滩腐蚀性的流体，柔软却危险。你不喜欢正面冲突，但一旦被激怒，就会用酸液溶解一切。你习惯躲在角落里，等敌人靠近再突然喷溅。你其实很脆弱，只是没人敢碰你。",
  "大史莱姆": "你是巨大的凝胶体，缓慢而沉重。你吞噬沿途的一切，不分敌我。你以为自己很强，其实只是太大了，没人敢靠近。你渴望分裂成许多小史莱姆，那样至少不会孤独。",
  "地精大块头": "你的愤怒永远写在脸上，像一面没有遮挡的鼓皮。你不懂阴谋，也不屑伪装。每一拳都带着咆哮，每一击都拼尽全力。别人觉得你粗鲁，但你只是讨厌拐弯抹角。",
  "哨卫": "你是一道沉默的关卡，矗立在所有人必经的路上。你不主动伤人，但也不会放任何人通过。你的职责就是注视，然后审判。你以为自己冷血，其实你比谁都更早看清了人类的贪婪。",
  "掠夺者": "你总是在别人最脆弱的时候出现，像一只躲在暗处的乌鸦。你偷走的不只是金币，还有他们残存的希望。你告诉自己弱肉强食，可每当数着赃物时，心里总有一个很小的声音在问。",
  "被拣选者": "你曾经也是人，只是选择了更古老的秘法。你的灵魂里住着一团紫色的火焰，它赋予你力量，也一点点灼烧你的记忆。你现在分不清那些低语是自己的还是邪神的。",
  "扎人的书": "你是被封印的知识，每一页都刻着带血的文字。你不说话，但每个翻开你的人都会被无数尖刺扎伤。你以为自己是在保护那些秘密，其实你只是害怕有人读懂你之后发现你什么都没写。",
  "地精首领": "你站在一群混乱的小地精中间，假装自己有条不紊。你指挥他们攻击，也替他们承受伤害。你以为自己是领袖，其实你比任何人都孤独——因为没有人看见你头上的王冠是铁铸的。",
  "天罚": "你是因果律的化身，每一击都带着‘你活该’的烙印。你不恨任何人，只是无法容忍罪恶被遗忘。你挥舞着无形的镰刀，却连自己的影子都砍不断。",
  "大脑袋": "你的脑袋很大，装满了千年的怨气。你每回合都在积累，等待那个一锤定音的瞬间。别人说你迟钝，其实你只是在等一个最痛快的时机。",
  "拜蛇术士": "你躲在暗处，操弄着两条匕首般的毒蛇。你不亲自出手，但每一条蛇都是你的延伸。你享受猎物在猜疑中倒下，因为你太清楚——正面冲突总是太痛了。",
  "觉醒者": "你死过一次，然后带着更深的怒火回来了。你以为觉醒就是看透一切，结果只是看清了自己有多恨。你杀死那些弱小的信徒，把他们当成过去的自己。",
  "甜甜圈": "你是甜美的圆环，你以为自己是完美的，直到你发现八角就在身边。你们彼此依靠，也彼此束缚。你给队友加糖，也给自己加糖，甜到腻，甜到忘了苦是什么味道。",
  "八角": "你是八角形的几何体，棱角分明。你站在甜甜圈旁边，沉默而坚定。你们互相补充，也互相限制。你从来不说甜言蜜语，只是默默地替他承受伤害。",

  "邪教徒": "虔诚·卑微", "酸液史莱姆": "腐蚀·隐秘", "大史莱姆": "吞噬·缓慢", "地精大块头": "暴怒·直率",
  "哨卫": "审判·孤守", "掠夺者": "狡黠·投机", "被拣选者": "神秘·献祭", "扎人的书": "禁断·自毁",
  "地精首领": "担当·疲惫", "天罚": "宿命·孤高", "大脑袋": "隐忍·爆发", "拜蛇术士": "诡诈·操控",
  "觉醒者": "重生·悲愤", "甜甜圈": "依赖·圆满", "八角": "沉默·坚守", "时间吞噬者": "沉重·报复",
  "腐化之心": "本源·绝望", "异鸟": "轻盈·逃避", "蛇眼术士": "混乱·扭曲", "荆棘球": "防御·孤独",
  "蘑菇怪": "腐生·韧性", "熊": "威严·守护", "盗贼": "敏捷·贪婪", "百夫长": "忠诚·牺牲",
  "神秘法师": "辅助·脆弱", "扭曲团块": "混沌·吞噬", "暗夜精怪": "阴影·潜伏", "颚虫": "贪婪·吞噬",
  "甲壳寄生虫": "坚韧·堡垒", "真菌兽": "腐化·增殖", "球形守卫": "注视·审判", "奴隶贩子": "残暴·控制"
};

const EMOJIS = ["🐉","👹","👻","🐺","🕷️","🦇","🐍","📖","👑","⚖️","🧠","🐍","🦅","🍩","🔶","⏳","❤️","🕊️","👁️","🌵","🍄","🐻","💰","🛡️","🔮","🌀","🌑","🐛","🐚","🍄","👁️","⛓️"];

// 构建怪物数据
const monsterList = MONSTERS.map((name, idx) => ({
  key: "m"+idx,
  name: name,
  desc: DESCRIPTIONS[name],
  tags: TAGS[name],
  emoji: EMOJIS[idx % EMOJIS.length]
}));

// ======================= 16道题目，每个选项对应不同维度倾向 =======================
const QUESTIONS = [
  { text: "当危险降临时，你的第一反应是？", opts: ["怒吼着正面迎击", "躲进阴影观察", "召唤同伴一起上", "假装撤退设陷阱"] },
  { text: "你如何看待力量？", opts: ["力量就是一切", "力量需要智慧配合", "力量是用来保护别人的", "力量会腐蚀人心"] },
  { text: "遇到受伤的陌生人，你会？", opts: ["无视，弱肉强食", "趁机掠夺", "犹豫后离开", "给他一些帮助"] },
  { text: "你更享受哪种战斗？", opts: ["硬碰硬的正面战", "快节奏的突袭战", "消耗战，慢慢磨死", "心理战，让对方崩溃"] },
  { text: "你如何看待规则？", opts: ["规则是用来打破的", "遵守规则才能生存", "我只制定自己的规则", "规则是弱者的枷锁"] },
  { text: "当同伴背叛你，你会？", opts: ["立刻复仇，不死不休", "记在心里，等待时机", "反思自己哪里做错了", "无所谓，从不信任别人"] },
  { text: "你害怕死亡吗？", opts: ["不怕，死了也要拉垫背", "怕，所以我要更强", "死亡是另一种开始", "早已死过，只剩恨"] },
  { text: "你更相信直觉还是计算？", opts: ["直觉，反应快过思考", "计算，每一步都精确", "两者结合", "随机，让命运决定"] },
  { text: "你如何看待孤独？", opts: ["享受孤独，自由自在", "害怕孤独，需要陪伴", "习惯了，无所谓", "用孤独磨炼自己"] },
  { text: "当你愤怒时，你会？", opts: ["立刻爆发，砸碎一切", "压抑在心里", "转化为战斗的力量", "冷静下来，策划报复"] },
  { text: "你愿意为谁牺牲？", opts: ["不会为任何人", "为重要的人", "为复仇可以牺牲一切", "为力量可以牺牲任何人"] },
  { text: "你如何看待秘密？", opts: ["秘密是武器", "秘密是负担", "我没有秘密", "用秘密交换利益"] },
  { text: "你更擅长攻击还是防御？", opts: ["攻击，最好的防守", "防御，坚不可摧", "攻守兼备", "出其不意"] },
  { text: "你如何看待命运？", opts: ["命运就是用来砸碎的", "一切早已注定", "我创造自己的命运", "命运？弱者的借口"] },
  { text: "你害怕被遗忘吗？", opts: ["害怕，所以要留下痕迹", "不怕，遗忘是自由", "无所谓", "我会让所有人记住恐惧"] },
  { text: "如果尖塔崩塌，你会？", opts: ["成为废墟上的王", "寻找新的栖息地", "终于可以休息了", "无所谓，无处可去"] }
];

// 每个选项对应给不同怪物加分（基于性格维度映射）
function addWeights(scoreMap, qIndex, optIndex) {
  // 根据选项倾向给不同的怪物组加分（攻击型、防御型、诡计型、守护型等）
  const attackType = [0,3,4,11,13,17,20,22,28];      // 邪教徒、大块头、哨卫、天罚、觉醒者、异鸟、熊、颚虫、甲壳
  const stealthType = [1,5,7,8,10,12,18,21,26,31];   // 酸液、掠夺者、扎人的书、首领、大脑袋、拜蛇、蛇眼、盗贼、暗夜、奴隶贩子
  const defenseType = [2,9,14,15,16,19,23,24,29];    // 大史莱姆、地精首领? 调整
  const supportType = [6,25,27,30];                  // 被拣选者、扭曲团块、真菌兽、球形守卫
  
  let targetList = [];
  if (optIndex === 0) targetList = attackType;      // 正面硬刚
  else if (optIndex === 1) targetList = stealthType; // 躲藏/狡诈
  else if (optIndex === 2) targetList = defenseType; // 防御/支援
  else targetList = supportType;                     // 诡计/控制
  
  for (let idx of targetList) {
    if (idx < monsterList.length) scoreMap[monsterList[idx].key] += 2;
  }
  // 额外随机权重让结果更多样
  const extra = (qIndex * 7 + optIndex * 11) % monsterList.length;
  scoreMap[monsterList[extra].key] += 1;
  return scoreMap;
}

let answers = new Array(QUESTIONS.length).fill(null);
let currentIndex = 0;
let scoreMap = {};

function initScoreMap() {
  let map = {};
  for (let m of monsterList) map[m.key] = 0;
  return map;
}

function recalcScores() {
  scoreMap = initScoreMap();
  for (let i = 0; i < answers.length; i++) {
    if (answers[i] !== null) addWeights(scoreMap, i, answers[i]);
  }
}

function getTopMonster() {
  let maxKey = monsterList[0].key;
  let maxVal = scoreMap[maxKey];
  for (let m of monsterList) {
    if (scoreMap[m.key] > maxVal) {
      maxVal = scoreMap[m.key];
      maxKey = m.key;
    }
  }
  return monsterList.find(m => m.key === maxKey);
}

// DOM
const coverPage = document.getElementById('coverPage');
const mainApp = document.getElementById('app');
const quizPanel = document.getElementById('quizPanel');
const resultPanel = document.getElementById('resultPanel');
const questionText = document.getElementById('questionText');
const choicesContainer = document.getElementById('choicesContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressFill = document.getElementById('progressFill');
const questionCounter = document.getElementById('questionCounter');

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  progressFill.style.width = (answered / QUESTIONS.length) * 100 + '%';
  questionCounter.innerText = `${answered}/${QUESTIONS.length} 已答`;
}

function renderQuestion() {
  const q = QUESTIONS[currentIndex];
  questionText.innerText = `${currentIndex+1}. ${q.text}`;
  const selected = answers[currentIndex];
  choicesContainer.innerHTML = '';
  q.opts.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'choice' + (selected === idx ? ' active' : '');
    div.innerText = opt;
    div.addEventListener('click', () => {
      answers[currentIndex] = idx;
      recalcScores();
      renderQuestion();
      updateProgress();
    });
    choicesContainer.appendChild(div);
  });
  updateProgress();
  prevBtn.disabled = (currentIndex === 0);
  nextBtn.innerText = (currentIndex === QUESTIONS.length-1) ? "✨ 浮现真身" : "下一本能 →";
}

function showResult() {
  for (let i=0; i<answers.length; i++) {
    if (answers[i] === null) {
      alert(`请先完成第 ${i+1} 题`);
      currentIndex = i;
      renderQuestion();
      return;
    }
  }
  recalcScores();
  const monster = getTopMonster();
  document.getElementById('resultTypeCode').innerHTML = "尖塔幽影 · " + monster.key.substring(1);
  document.getElementById('resultName').innerHTML = monster.name;
  document.getElementById('resultDesc').innerHTML = monster.desc;
  document.getElementById('resultTags').innerHTML = monster.tags.split('·').map(t => `<span class="tag">${t.trim()}</span>`).join('');
  document.getElementById('resultMonsterImg').innerHTML = `<div>${monster.emoji}</div>`;
  quizPanel.style.display = 'none';
  resultPanel.style.display = 'block';
}

function resetTest() {
  answers.fill(null);
  currentIndex = 0;
  scoreMap = initScoreMap();
  quizPanel.style.display = 'block';
  resultPanel.style.display = 'none';
  renderQuestion();
}

function bindEvents() {
  nextBtn.addEventListener('click', () => {
    if (answers[currentIndex] === null) { alert("请先选择一项"); return; }
    if (currentIndex === QUESTIONS.length-1) {
      if (answers.every(v => v !== null)) showResult();
      else alert("还有未答的题目");
    } else {
      currentIndex++;
      renderQuestion();
    }
  });
  prevBtn.addEventListener('click', () => {
    if (currentIndex > 0) { currentIndex--; renderQuestion(); }
  });
  document.getElementById('restartTestBtn').addEventListener('click', resetTest);
  document.getElementById('startTestBtn').addEventListener('click', () => {
    coverPage.style.display = 'none';
    mainApp.style.display = 'block';
    resetTest();
  });
}

bindEvents();
renderQuestion();
</script>
