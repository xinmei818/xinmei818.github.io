<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>尖塔万灵 · 雨声中的怪物灵魂 (120型)</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: #0a0c12;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
  font-family: '华文楷书', '华文行书', 'STXingkai', '楷体', 'Noto Serif SC', serif;
}

/* 雨丝背景 */
.rain-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.rain-bg span {
  position: absolute;
  width: 1.5px;
  background: rgba(180, 200, 220, 0.45);
  border-radius: 1px;
  animation: rainDrop linear infinite;
  will-change: transform;
}

@keyframes rainDrop {
  0% { transform: translateY(-120vh); opacity: 0.2; }
  15% { opacity: 0.7; }
  85% { opacity: 0.7; }
  100% { transform: translateY(120vh); opacity: 0; }
}

/* 主卡片 */
.main {
  position: relative;
  z-index: 2;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  background: rgba(18, 20, 28, 0.94);
  backdrop-filter: blur(4px);
  border-radius: 48px;
  box-shadow: 0 20px 45px -8px rgba(0,0,0,0.8);
  overflow: hidden;
  border: 1px solid rgba(180, 140, 80, 0.3);
}

.header {
  background: linear-gradient(135deg, #1e2a2e, #2c3e2f);
  color: #e2e0c8;
  padding: 28px 24px;
  text-align: center;
}

.header h1 {
  font-size: 26px;
  font-weight: 500;
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.header p {
  font-size: 13px;
  opacity: 0.85;
}

.progress-bar {
  height: 4px;
  background: #2f2f3a;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6b9e6b, #b8c77a);
  width: 0%;
  transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.count {
  text-align: center;
  font-size: 13px;
  font-weight: 400;
  color: #b8c77a;
  background: #1e1f28;
  padding: 8px 0 6px;
  letter-spacing: 1px;
}

.question-box {
  padding: 32px 28px;
}

.question-title {
  font-size: 20px;
  font-weight: 500;
  line-height: 1.5;
  margin-bottom: 28px;
  color: #f2e4c6;
  text-shadow: 0 1px 1px rgba(0,0,0,0.3);
}

.choices {
  display: grid;
  gap: 12px;
}

.choice {
  padding: 14px 20px;
  border: 1px solid #4a4a5a;
  border-radius: 32px;
  cursor: pointer;
  transition: all 0.2s ease;
  background: #2a2a34;
  font-size: 15px;
  font-weight: 400;
  color: #ddd0b8;
  touch-action: manipulation;
  text-align: left;
  line-height: 1.4;
}

.choice:hover {
  border-color: #8ab86a;
  background: #3a3f44;
  transform: translateY(-1px);
}

.choice.active {
  border-color: #c7e09c;
  background: #4d5a3c;
  color: #fff4e4;
  font-weight: 500;
  box-shadow: 0 4px 10px rgba(120, 150, 60, 0.25);
}

.nav {
  padding: 8px 28px 32px;
  display: flex;
  gap: 14px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 40px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  flex: 1;
  transition: 0.2s;
  font-family: inherit;
}

.btn-back {
  background: #323240;
  color: #cfc6b0;
}

.btn-back:hover:not(:disabled) {
  background: #424252;
}

.btn-back:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-next {
  background: #6b9e6b;
  color: #fff8ec;
  box-shadow: 0 2px 8px rgba(80, 120, 50, 0.4);
}

.btn-next:hover {
  background: #8ab86a;
  transform: translateY(-1px);
}

/* 封面页 */
.cover-page {
  position: relative;
  z-index: 2;
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
  background: rgba(20, 20, 28, 0.92);
  backdrop-filter: blur(12px);
  border-radius: 64px;
  padding: 48px 32px 56px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(140, 180, 90, 0.4);
}

.cover-title {
  font-size: 48px;
  font-weight: 500;
  color: #d8e4aa;
  letter-spacing: 6px;
  margin-bottom: 24px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

.cover-sub {
  font-size: 16px;
  color: #b8c77a;
  margin-bottom: 40px;
  border-top: 1px solid rgba(140,180,90,0.3);
  display: inline-block;
  padding-top: 14px;
}

.cover-desc {
  font-size: 15px;
  color: #d0c0a0;
  line-height: 1.8;
  margin-bottom: 48px;
  max-width: 80%;
  margin-left: auto;
  margin-right: auto;
}

.start-btn {
  background: linear-gradient(145deg, #4a6e3a, #2d4a1e);
  border: none;
  padding: 16px 48px;
  font-size: 20px;
  font-weight: 500;
  color: #fcf3e0;
  border-radius: 60px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 6px 14px rgba(0,0,0,0.4);
  font-family: inherit;
  letter-spacing: 2px;
}

.start-btn:hover {
  transform: scale(1.02);
  background: linear-gradient(145deg, #6b9e4a, #3e6b28);
}

/* 结果页面 */
.result-page {
  display: none;
  padding: 32px 28px;
}

.result-monster-img {
  text-align: center;
  margin-bottom: 20px;
}

.result-monster-img img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  border-radius: 20px;
  background: #2a2a34;
  padding: 8px;
}

.result-type {
  font-size: 28px;
  font-weight: 500;
  color: #d8e4aa;
  letter-spacing: 2px;
  margin-bottom: 12px;
  border-left: 3px solid #b8c77a;
  padding-left: 20px;
}

.result-name {
  font-size: 24px;
  font-weight: 500;
  color: #e2d7c0;
  margin-bottom: 16px;
  padding-left: 20px;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 16px 0 20px;
  padding-left: 20px;
}

.tag {
  background: #2a2a34;
  padding: 4px 14px;
  border-radius: 30px;
  font-size: 12px;
  color: #b8c77a;
}

.result-desc {
  line-height: 1.75;
  font-size: 15px;
  color: #e2d6c2;
  background: rgba(45, 50, 35, 0.7);
  padding: 24px 24px;
  border-radius: 32px;
  margin-top: 20px;
  border: 1px solid rgba(140, 180, 90, 0.3);
  white-space: pre-wrap;
}

.restart-btn {
  margin-top: 28px;
  background: #323240;
  color: #b8c77a;
  font-weight: 500;
  width: 100%;
  padding: 12px;
  border-radius: 40px;
  cursor: pointer;
}

.restart-btn:hover {
  background: #454558;
}

@media (max-width: 550px) {
  body { padding: 12px; }
  .cover-title { font-size: 38px; letter-spacing: 4px; }
  .question-box { padding: 24px 20px; }
  .question-title { font-size: 18px; }
  .result-type { font-size: 22px; }
  .result-name { font-size: 20px; }
  .result-monster-img img { width: 70px; height: 70px; }
}
</style>
</head>
<body>
<div class="rain-bg" id="rainBg"></div>

<div class="cover-page" id="coverPage">
  <div class="cover-title">尖塔万灵</div>
  <div class="cover-sub">· 雨声中的怪物灵魂 (120型) ·</div>
  <div class="cover-desc">淅淅沥沥的雨滴敲打塔顶，你听见自己的心跳和某种古老的低语。<br>64道本能之问，120个灵魂回响。</div>
  <button class="start-btn" id="startTestBtn">步入雨中</button>
</div>

<div class="main" id="app" style="display: none;">
  <div class="header">
    <h1>尖塔万灵</h1>
    <p>攻击·意图·本能 | 120重怪物灵魂</p>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="count" id="questionCounter"></div>

  <div id="quizPanel">
    <div class="question-box">
      <div class="question-title" id="questionText"></div>
      <div class="choices" id="choicesContainer"></div>
    </div>
    <div class="nav">
      <button class="btn-back" id="prevBtn" disabled>◀ 回溯</button>
      <button class="btn-next" id="nextBtn">回应本能 ▶</button>
    </div>
  </div>

  <div id="resultPanel" class="result-page" style="display: none;">
    <div class="result-monster-img" id="resultMonsterImg"></div>
    <div class="result-type" id="resultTypeCode"></div>
    <div class="result-name" id="resultName"></div>
    <div class="tags" id="resultTags"></div>
    <div class="result-desc" id="resultDesc"></div>
    <button class="restart-btn" id="restartTestBtn">重回雨中</button>
  </div>
</div>

<script>
// ======================= 雨丝动画 =======================
(function initRain() {
  const container = document.getElementById('rainBg');
  if (!container) return;
  const RAIN_COUNT = 140;
  for (let i = 0; i < RAIN_COUNT; i++) {
    const drop = document.createElement('span');
    drop.style.left = Math.random() * 100 + '%';
    drop.style.height = (Math.random() * 70 + 30) + 'px';
    const duration = Math.random() * 1.2 + 0.8;
    drop.style.animationDuration = duration + 's';
    drop.style.animationDelay = Math.random() * 5 + 's';
    container.appendChild(drop);
  }
})();

// ======================= 淅沥雨声 =======================
class RainSound {
  constructor() {
    this.audioCtx = null;
    this.source = null;
    this.gainNode = null;
    this.isMuted = false;
    this.initiated = false;
  }
  async init() {
    if (this.initiated) return;
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      this.gainNode = this.audioCtx.createGain();
      this.gainNode.connect(this.audioCtx.destination);
      this.gainNode.gain.value = this.isMuted ? 0 : 0.28;
      const sampleRate = this.audioCtx.sampleRate;
      const bufferSize = sampleRate * 3;
      const buffer = this.audioCtx.createBuffer(1, bufferSize, sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        let noise = (Math.random() * 2 - 1) * 0.55;
        if (Math.random() < 0.04) noise += (Math.random() * 0.35);
        data[i] = noise;
      }
      this.source = this.audioCtx.createBufferSource();
      this.source.buffer = buffer;
      this.source.loop = true;
      this.source.connect(this.gainNode);
      this.source.start();
      this.initiated = true;
      if (this.audioCtx.state === 'suspended') await this.audioCtx.resume();
    } catch(e) { console.warn("雨声初始化失败", e); }
  }
  async mute() { if (!this.initiated) return; this.isMuted = true; if(this.gainNode) this.gainNode.gain.linearRampToValueAtTime(0, this.audioCtx.currentTime+0.1); }
  async unmute() { if (!this.initiated) await this.init(); this.isMuted = false; if(this.gainNode && this.audioCtx) { if(this.audioCtx.state === 'suspended') await this.audioCtx.resume(); this.gainNode.gain.linearRampToValueAtTime(0.28, this.audioCtx.currentTime+0.1); } }
  toggle() { this.isMuted ? this.unmute() : this.mute(); }
}
const rainSound = new RainSound();
let soundStarted = false;
function startRainOnGesture() { if (soundStarted) return; soundStarted = true; rainSound.init().then(() => { rainSound.unmute(); }).catch(e=>console.warn); }
document.body.addEventListener('click', startRainOnGesture, { once: true });
document.body.addEventListener('touchstart', startRainOnGesture, { once: true });

// ======================= 生成120个怪物数据（塔1+塔2） =======================
const MONSTER_LIST = [
  // 塔1 普通怪物 (36个)
  "邪教徒","史莱姆(S)","史莱姆(L)","地精大块头","哨卫","掠夺者","被拣选者","扎人的书","地精首领",
  "天罚","大脑袋","拜蛇术士","觉醒者","甜甜圈","时间吞噬者","腐化之心","异鸟","蛇眼术士",
  "荆棘球","蘑菇怪","熊","盗贼","百夫长","神秘法师","扭曲团块","暗夜精怪","颚虫","甲壳怪",
  "真菌兽","球形守卫","奴隶贩子","小地精","尖塔蔓藤","咔咔盗贼","红地精","蓝地精",
  // 塔2 新增怪物 (杀戮尖塔2 已知及扩展)
  "尖塔铁匠","锈蚀骑士","枯萎花妖","镜中幽灵","裂隙行者","琥珀守卫","深渊凝视者","咒术傀儡",
  "骨龙幼崽","雷光蝶","霜晶虫","血月狼","影缝魔","熔核巨像","紫雾巫妖","荆棘女王",
  "砂时虫","虚空卵","腐沼巨口","灵体学者","荆棘战车","幻影射手","古墓守护者","灾厄之眼",
  "蠕行咒怨","双生畸体","叹息之墙","永冻祭司","爆裂孢子","迷途的锻造神","星陨兽","时计魔像",
  "虹吸怪","余烬鸟","腐根树精","潮汐唤者","虚空幼蛛","熵变怪","诅咒之棺","静默侍僧",
  "骸骨法师","贪婪蠕虫","回声聚合体","咒刃刺客","影舞者","苍白屠夫","夜嚎者","锈铁巨兵",
  "裂魂妖","风暴之灵","地脉蛀虫","符文守护者","灵质史莱姆","暗影执政官","熔岩猎犬","翡翠龙裔",
  "水晶哨兵","黑铁巨人","迷雾幽灵","幻象编织者","厄运使者","虚空吞噬者","尖塔之心(堕化)","终末观测者"
];
// 确保正好120个
while(MONSTER_LIST.length < 120) MONSTER_LIST.push("尖塔幽魂" + (MONSTER_LIST.length-100));
const MONSTER_KEYS = MONSTER_LIST.map((name, idx) => "m"+idx);
// 构建详细数据
const MONSTER_DATA = {};
for (let i = 0; i < MONSTER_LIST.length; i++) {
  const name = MONSTER_LIST[i];
  const tagsList = ["雨夜","孤影","低语","徘徊","执念","暗涌","锈蚀","余烬"];
  const tag = tagsList[ i % tagsList.length ] + "·" + tagsList[(i+3)%tagsList.length];
  const descs = [
    `你是${name}，在尖塔的某个角落静静等待。雨水打湿了你的轮廓，却冲不淡你内心的执拗。你曾有过名字，但早已被遗忘。你只记得自己要做一件事——等一个人，或杀一个人，或只是证明自己存在过。`,
    `你蜷缩在阴影里，像${name}一样呼吸着潮湿的空气。你不渴望阳光，因为阳光会灼伤你的皮肤。你只信任黑暗，因为黑暗从不审判。可每当雨滴落在你的额头，你都会恍惚——那是不是谁的眼泪？`,
    `你是${name}，身上刻满了战斗的痕迹。你不记得自己赢过多少次，只记得每一次倒下又站起来的感觉。尖塔的楼梯无穷无尽，而你只是其中一级。但你相信，总有人会踩过你，然后到达顶端。`,
    `你的灵魂与${name}共鸣。你习惯用沉默保护自己，用疏离伪装脆弱。你以为自己不在乎，其实你在乎得要命。只是你怕，怕一开口，就会像雨一样碎掉。`
  ];
  const desc = descs[ i % descs.length ];
  MONSTER_DATA[MONSTER_KEYS[i]] = {
    name: name,
    desc: desc,
    tags: tag,
    img: "" // 使用emoji降级
  };
}

// ======================= 64道题目（符合杀戮尖塔风格） =======================
const QUESTIONS = [];
const questionTemplates = [
  "当第一滴雨落在你的额头，你会？",
  "你如何看待这座不断生长的尖塔？",
  "遇到一个比你弱小的生物，你会？",
  "当你的力量被封印，你会？",
  "你更相信直觉还是计算？",
  "你如何看待“背叛”？",
  "如果可以选择，你希望成为？",
  "你害怕被遗忘吗？",
  "你如何看待“诅咒”？",
  "当同伴陷入困境，你会？",
  "你享受追逐猎物吗？",
  "你如何看待“规则”？",
  "你会为了力量牺牲记忆吗？",
  "你记忆中最深刻的情绪是？",
  "你相信命运吗？",
  "当你听到神秘的耳语，你会？",
  "你更喜欢单独行动还是团队配合？",
  "你如何看待“死亡”？",
  "你会为了保护什么而牺牲自己？",
  "你如何看待“时间”？",
  "你的愤怒通常持续多久？",
  "你更擅长攻击还是防御？",
  "你如何看待“秘密”？",
  "当你的计谋被识破，你会？",
  "你害怕黑暗吗？",
  "你如何看待“复仇”？",
  "你会轻易相信别人吗？",
  "你如何看待“财富”？",
  "当你受伤时，你的本能是？",
  "你如何看待“知识”？",
  "你更愿意在什么环境下战斗？",
  "你如何看待“孤独”？",
  "你会为了生存而抛弃情感吗？",
  "你如何看待“权力”？",
  "你的弱点是什么？",
  "你如何看待“承诺”？",
  "当你面对无法战胜的敌人，你会？",
  "你如何看待“变化”？",

  "你会为了目的不择手段吗？",
  "你如何看待“命运”？",
  "当你感到恐惧，你会？",
  "你如何看待“正义”？",
  "你更相信力量还是智慧？",
  "你如何看待“谎言”？",
  "你会为过去的错误忏悔吗？",
  "你如何看待“希望”？",
  "当你独自一人时，你会想什么？",
  "你如何看待“痛苦”？",
  "你会主动寻求战斗吗？",
  "你如何看待“和平”？",
  "你的梦想是什么？",
  "你如何看待“永恒”？",
  "当你失败时，你会？",
  "你如何看待“救赎”？",
  "你更珍惜回忆还是未来？",
  "你如何看待“疯狂”？",
  "你会为了他人而改变自己吗？",
  "你如何看待“寂静”？",
  "你的内心住着什么？",
  "你如何看待“终点”？",
  "如果明天就是尖塔崩塌，你会？"
];
// 生成64道，每道4个选项
for (let i = 0; i < 64; i++) {
  const base = i % questionTemplates.length;
  const text = questionTemplates[base];
  const opts = [
    "毫不犹豫地迎上去",
    "先观察，再决定",
    "转身离开，不纠缠",
    "用计谋设下陷阱"
  ];
  QUESTIONS.push({ text, opts });
}

// ======================= 权重分配：每道题给不同怪物加分，确保120个都能出现 =======================
function addWeights(scoreMap, qIndex, optIndex) {
  // 使用伪随机但确定性的分配：每个选项影响约6-8个怪物
  const monsterCount = MONSTER_KEYS.length;
  const seed = (qIndex * 131 + optIndex * 253) % monsterCount;
  for (let i = 0; i < 8; i++) {
    const idx = (seed + i * 17) % monsterCount;
    scoreMap[MONSTER_KEYS[idx]] += (optIndex === 0 ? 2 : (optIndex === 3 ? 3 : 1));
  }
  // 额外根据选项倾向增加某些类型
  if (optIndex === 0) {
    // 攻击型
    const aggressive = [0,2,4,6,8,10];
    for (let a of aggressive) {
      if (a < monsterCount) scoreMap[MONSTER_KEYS[a]] += 1;
    }
  } else if (optIndex === 3) {
    // 诡计型
    const tricky = [5,7,9,11,13,15];
    for (let t of tricky) {
      if (t < monsterCount) scoreMap[MONSTER_KEYS[t]] += 1;
    }
  }
  return scoreMap;
}

// 测试状态
let answers = new Array(QUESTIONS.length).fill(null);
let currentIndex = 0;
let scoreMap = {};

function initScoreMap() {
  let map = {};
  for (let m of MONSTER_KEYS) map[m] = 0;
  return map;
}

function recalcAllScores() {
  scoreMap = initScoreMap();
  for (let i = 0; i < answers.length; i++) {
    if (answers[i] !== null) {
      addWeights(scoreMap, i, answers[i]);
    }
  }
}

function getTopMonster() {
  let maxKey = MONSTER_KEYS[0];
  let maxVal = scoreMap[maxKey];
  for (let m of MONSTER_KEYS) {
    if (scoreMap[m] > maxVal) { maxVal = scoreMap[m]; maxKey = m; }
  }
  return maxKey;
}

// DOM 元素
const coverPage = document.getElementById('coverPage');
const mainApp = document.getElementById('app');
const quizPanel = document.getElementById('quizPanel');
const resultPanel = document.getElementById('resultPanel');
const questionTextEl = document.getElementById('questionText');
const choicesContainer = document.getElementById('choicesContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressFill = document.getElementById('progressFill');
const questionCounter = document.getElementById('questionCounter');

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  progressFill.style.width = (answered / QUESTIONS.length) * 100 + '%';
  questionCounter.innerText = `${answered}/${QUESTIONS.length} 已答`;
}

function renderQuestion() {
  const q = QUESTIONS[currentIndex];
  questionTextEl.innerText = `${currentIndex+1}. ${q.text}`;
  const selectedIdx = answers[currentIndex];
  choicesContainer.innerHTML = '';
  q.opts.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'choice' + (selectedIdx === idx ? ' active' : '');
    div.innerText = opt;
    div.addEventListener('click', () => {
      answers[currentIndex] = idx;
      recalcAllScores();
      renderQuestion();
      updateProgress();
    });
    choicesContainer.appendChild(div);
  });
  updateProgress();
  prevBtn.disabled = (currentIndex === 0);
  nextBtn.innerText = (currentIndex === QUESTIONS.length-1) ? "✨ 浮现真身" : "下一本能 →";
}

function showResult() {
  for (let i=0; i<answers.length; i++) {
    if (answers[i] === null) {
      alert(`请先完成第 ${i+1} 题再窥视雨中影子`);
      currentIndex = i;
      renderQuestion();
      return;
    }
  }
  recalcAllScores();
  const monsterKey = getTopMonster();
  const data = MONSTER_DATA[monsterKey];
  if (!data) { console.error("缺失数据", monsterKey); return; }
  document.getElementById('resultTypeCode').innerHTML = "尖塔幽影 · " + monsterKey.substring(1);
  document.getElementById('resultName').innerHTML = data.name;
  document.getElementById('resultDesc').innerHTML = data.desc;
  document.getElementById('resultTags').innerHTML = data.tags.split('·').map(t => `<span class="tag">${t.trim()}</span>`).join('');
  // 图片：使用emoji替代，避免加载失败
  const emojiMap = ["🐉","👹","👻","🐺","🕷️","🦇","🐍","🦂","🌿","🔥","❄️","⚡","💀","👁️","🧠","🩸"];
  const emoji = emojiMap[parseInt(monsterKey.substring(1)) % emojiMap.length];
  document.getElementById('resultMonsterImg').innerHTML = `<div style="font-size:70px; text-align:center; background:#2a2a34; border-radius:50%; width:100px; height:100px; display:flex; align-items:center; justify-content:center; margin:0 auto;">${emoji}</div>`;
  quizPanel.style.display = 'none';
  resultPanel.style.display = 'block';
}

function resetTest() {
  answers.fill(null);
  currentIndex = 0;
  scoreMap = initScoreMap();
  quizPanel.style.display = 'block';
  resultPanel.style.display = 'none';
  renderQuestion();
}

function bindEvents() {
  nextBtn.addEventListener('click', () => {
    if (answers[currentIndex] === null) { alert("请先选择一项"); return; }
    if (currentIndex === QUESTIONS.length-1) {
      if (answers.every(v => v !== null)) showResult();
      else alert("还有未答的题目");
    } else {
      currentIndex++;
      renderQuestion();
    }
  });
  prevBtn.addEventListener('click', () => {
    if (currentIndex > 0) { currentIndex--; renderQuestion(); }
  });
  document.getElementById('restartTestBtn').addEventListener('click', resetTest);
  document.getElementById('startTestBtn').addEventListener('click', () => {
    coverPage.style.display = 'none';
    mainApp.style.display = 'block';
    resetTest();
  });
}

bindEvents();
renderQuestion();
</script>
