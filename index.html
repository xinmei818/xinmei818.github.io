<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>尖塔之影 · 雨声中的怪物灵魂</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: #0a0c12;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow-x: hidden;
  font-family: '华文楷书', '华文行书', 'STXingkai', '楷体', 'Noto Serif SC', serif;
}

.rain-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.rain-bg span {
  position: absolute;
  width: 1.5px;
  background: rgba(180, 200, 220, 0.45);
  border-radius: 1px;
  animation: rainDrop linear infinite;
  will-change: transform;
}

@keyframes rainDrop {
  0% { transform: translateY(-120vh); opacity: 0.2; }
  15% { opacity: 0.7; }
  85% { opacity: 0.7; }
  100% { transform: translateY(120vh); opacity: 0; }
}

.main {
  position: relative;
  z-index: 2;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  background: rgba(18, 20, 28, 0.94);
  backdrop-filter: blur(4px);
  border-radius: 48px;
  box-shadow: 0 20px 45px -8px rgba(0,0,0,0.8);
  overflow: hidden;
  border: 1px solid rgba(180, 140, 80, 0.3);
}

.header {
  background: linear-gradient(135deg, #1e2a2e, #2c3e2f);
  color: #e2e0c8;
  padding: 28px 24px;
  text-align: center;
}

.header h1 {
  font-size: 26px;
  font-weight: 500;
  letter-spacing: 4px;
  margin-bottom: 8px;
}

.header p {
  font-size: 13px;
  opacity: 0.85;
}

.progress-bar {
  height: 4px;
  background: #2f2f3a;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6b9e6b, #b8c77a);
  width: 0%;
  transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.count {
  text-align: center;
  font-size: 13px;
  font-weight: 400;
  color: #b8c77a;
  background: #1e1f28;
  padding: 8px 0 6px;
  letter-spacing: 1px;
}

.question-box {
  padding: 32px 28px;
}

.question-title {
  font-size: 20px;
  font-weight: 500;
  line-height: 1.5;
  margin-bottom: 28px;
  color: #f2e4c6;
  text-shadow: 0 1px 1px rgba(0,0,0,0.3);
}

.choices {
  display: grid;
  gap: 12px;
}

.choice {
  padding: 14px 20px;
  border: 1px solid #4a4a5a;
  border-radius: 32px;
  cursor: pointer;
  transition: all 0.2s ease;
  background: #2a2a34;
  font-size: 15px;
  font-weight: 400;
  color: #ddd0b8;
  touch-action: manipulation;
  text-align: left;
  line-height: 1.4;
}

.choice:hover {
  border-color: #8ab86a;
  background: #3a3f44;
  transform: translateY(-1px);
}

.choice.active {
  border-color: #c7e09c;
  background: #4d5a3c;
  color: #fff4e4;
  font-weight: 500;
  box-shadow: 0 4px 10px rgba(120, 150, 60, 0.25);
}

.nav {
  padding: 8px 28px 32px;
  display: flex;
  gap: 14px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 40px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  flex: 1;
  transition: 0.2s;
  font-family: inherit;
}

.btn-back {
  background: #323240;
  color: #cfc6b0;
}

.btn-back:hover:not(:disabled) {
  background: #424252;
}

.btn-back:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-next {
  background: #6b9e6b;
  color: #fff8ec;
  box-shadow: 0 2px 8px rgba(80, 120, 50, 0.4);
}

.btn-next:hover {
  background: #8ab86a;
  transform: translateY(-1px);
}

.cover-page {
  position: relative;
  z-index: 2;
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
  background: rgba(20, 20, 28, 0.92);
  backdrop-filter: blur(12px);
  border-radius: 64px;
  padding: 48px 32px 56px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(140, 180, 90, 0.4);
}

.cover-title {
  font-size: 48px;
  font-weight: 500;
  color: #d8e4aa;
  letter-spacing: 6px;
  margin-bottom: 24px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

.cover-sub {
  font-size: 16px;
  color: #b8c77a;
  margin-bottom: 40px;
  border-top: 1px solid rgba(140,180,90,0.3);
  display: inline-block;
  padding-top: 14px;
}

.cover-desc {
  font-size: 15px;
  color: #d0c0a0;
  line-height: 1.8;
  margin-bottom: 48px;
  max-width: 80%;
  margin-left: auto;
  margin-right: auto;
}

.start-btn {
  background: linear-gradient(145deg, #4a6e3a, #2d4a1e);
  border: none;
  padding: 16px 48px;
  font-size: 20px;
  font-weight: 500;
  color: #fcf3e0;
  border-radius: 60px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 6px 14px rgba(0,0,0,0.4);
  font-family: inherit;
  letter-spacing: 2px;
}

.start-btn:hover {
  transform: scale(1.02);
  background: linear-gradient(145deg, #6b9e4a, #3e6b28);
}

.result-page {
  display: none;
  padding: 32px 28px;
}

.result-monster-img {
  text-align: center;
  margin-bottom: 20px;
}

.result-monster-img div {
  width: 100px;
  height: 100px;
  background: #2a2a34;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  font-size: 56px;
}

.result-type {
  font-size: 28px;
  font-weight: 500;
  color: #d8e4aa;
  letter-spacing: 2px;
  margin-bottom: 12px;
  border-left: 3px solid #b8c77a;
  padding-left: 20px;
}

.result-name {
  font-size: 24px;
  font-weight: 500;
  color: #e2d7c0;
  margin-bottom: 16px;
  padding-left: 20px;
}

.tags {

  gap: 8px;
  margin: 16px 0 20px;
  padding-left: 20px;

.tag {
  background: #2a2a34;

  border-radius: 30px;
  font-size: 12px;
  color: #b8c77a;

.result-desc {
  line-height: 1.8;

  border: 1px solid rgba(140, 180, 90, 0.3);

.restart-btn {

  background: #323240;
  color: #b8c77a;
  font-weight: 500;

}

.restart-btn:hover {

}

@media (max-width: 550px) {
  body { padding: 12px; }
  .cover-title { font-size: 38px; letter-spacing: 4px; }

  .result-type { font-size: 22px; }
  .result-name { font-size: 20px; }
}
</style>
</head>
<body>
<div class="rain-bg" id="rainBg"></div>

<script>
// ======================= 雨丝动画 =======================
(function initRain() {
  const container = document.getElementById('rainBg');
  if (!container) return;
  const RAIN_COUNT = 140;
  for (let i = 0; i < RAIN_COUNT; i++) {
    const drop = document.createElement('span');
    drop.style.left = Math.random() * 100 + '%';
    drop.style.height = (Math.random() * 70 + 30) + 'px';
    const duration = Math.random() * 1.2 + 0.8;
    drop.style.animationDuration = duration + 's';
    drop.style.animationDelay = Math.random() * 5 + 's';
    container.appendChild(drop);
  }
})();

// ======================= 淅沥雨声 =======================
class RainSound {
  constructor() {
    this.audioCtx = null;
    this.source = null;
    this.gainNode = null;
    this.isMuted = false;
    this.initiated = false;
  }
  async init() {
    if (this.initiated) return;
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      this.gainNode = this.audioCtx.createGain();
      this.gainNode.connect(this.audioCtx.destination);
      this.gainNode.gain.value = this.isMuted ? 0 : 0.28;
      const sampleRate = this.audioCtx.sampleRate;
      const bufferSize = sampleRate * 3;
      const buffer = this.audioCtx.createBuffer(1, bufferSize, sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        let noise = (Math.random() * 2 - 1) * 0.55;
        if (Math.random() < 0.04) noise += (Math.random() * 0.35);
        data[i] = noise;
      }
      this.source = this.audioCtx.createBufferSource();
      this.source.buffer = buffer;
      this.source.loop = true;
      this.source.connect(this.gainNode);
      this.source.start();
      this.initiated = true;
      if (this.audioCtx.state === 'suspended') await this.audioCtx.resume();
    } catch(e) { console.warn("雨声初始化失败", e); }
  }
  async mute() { if (!this.initiated) return; this.isMuted = true; if(this.gainNode) this.gainNode.gain.linearRampToValueAtTime(0, this.audioCtx.currentTime+0.1); }
  async unmute() { if (!this.initiated) await this.init(); this.isMuted = false; if(this.gainNode && this.audioCtx) { if(this.audioCtx.state === 'suspended') await this.audioCtx.resume(); this.gainNode.gain.linearRampToValueAtTime(0.28, this.audioCtx.currentTime+0.1); } }
  toggle() { this.isMuted ? this.unmute() : this.mute(); }
}
const rainSound = new RainSound();
let soundStarted = false;
function startRainOnGesture() { if (soundStarted) return; soundStarted = true; rainSound.init().then(() => { rainSound.unmute(); }).catch(e=>console.warn); }
document.body.addEventListener('click', startRainOnGesture, { once: true });
document.body.addEventListener('touchstart', startRainOnGesture, { once: true });

// ======================= 生成120个怪物数据（塔1+塔2） =======================
const MONSTER_LIST = [
  "邪教徒","史莱姆(S)","史莱姆(L)","地精大块头","哨卫","掠夺者","被拣选者","扎人的书","地精首领",
  "天罚","大脑袋","拜蛇术士","觉醒者","甜甜圈","时间吞噬者","腐化之心","异鸟","蛇眼术士",
  "荆棘球","蘑菇怪","熊","盗贼","百夫长","神秘法师","扭曲团块","暗夜精怪","颚虫","甲壳怪",
  "真菌兽","球形守卫","奴隶贩子","小地精","尖塔蔓藤","咔咔盗贼","红地精","蓝地精",
  "尖塔铁匠","锈蚀骑士","枯萎花妖","镜中幽灵","裂隙行者","琥珀守卫","深渊凝视者","咒术傀儡",
  "骨龙幼崽","雷光蝶","霜晶虫","血月狼","影缝魔","熔核巨像","紫雾巫妖","荆棘女王",
  "砂时虫","虚空卵","腐沼巨口","灵体学者","荆棘战车","幻影射手","古墓守护者","灾厄之眼",
  "蠕行咒怨","双生畸体","叹息之墙","永冻祭司","爆裂孢子","迷途的锻造神","星陨兽","时计魔像",
  "虹吸怪","余烬鸟","腐根树精","潮汐唤者","虚空幼蛛","熵变怪","诅咒之棺","静默侍僧",
  "骸骨法师","贪婪蠕虫","回声聚合体","咒刃刺客","影舞者","苍白屠夫","夜嚎者","锈铁巨兵",
  "裂魂妖","风暴之灵","地脉蛀虫","符文守护者","灵质史莱姆","暗影执政官","熔岩猎犬","翡翠龙裔",
  "水晶哨兵","黑铁巨人","迷雾幽灵","幻象编织者","厄运使者","虚空吞噬者","尖塔之心(堕化)","终末观测者",
  "幽暗徘徊者","锈蚀弩车","疫病孢囊","寒霜侍从","燃烬魔像","电击鳗","岩甲龟","毒液花",
  "月光蛾","砂暴虫","怨灵聚合体","锈铁卫兵","咒缚者","深渊蛞蝓","晶化龙","灰烬使者"
];
while(MONSTER_LIST.length < 120) MONSTER_LIST.push("尖塔幽魂" + (MONSTER_LIST.length-100));
const MONSTER_KEYS = MONSTER_LIST.map((_, idx) => "m"+idx);
const MONSTER_DATA = {};
for (let i = 0; i < MONSTER_LIST.length; i++) {
  const name = MONSTER_LIST[i];
  const tagsList = ["雨夜","孤影","低语","徘徊","执念","暗涌","锈蚀","余烬","寒霜","烈焰","雷光","暗影"];
  const tag = tagsList[ i % tagsList.length ] + "·" + tagsList[(i+3)%tagsList.length];
  const longDesc = `你是${name}。\n\n雨声淅沥，你蜷缩在尖塔的某个角落，潮湿的空气浸润着你的每一寸皮肤。你不记得自己从何时开始存在，只记得每一次受伤后的嘶吼，每一次失败后的不甘。你曾试图离开这座塔，但发现你的根须已经与砖石长在一起。\n\n有人经过时，你会露出獠牙或利爪，但你并不总是想伤害他们。有时候你只是想知道——他们是否也和你一样，在雨夜里独自舔舐伤口？可你不敢问，因为你害怕答案。\n\n你的身上刻满了战斗的痕迹，有的来自敌人，有的来自你自己。你恨这座塔，却也依赖它。因为离开塔，你就什么都不是了。所以你选择留下，选择战斗，选择在每一个雨夜重复同样的戏码。\n\n直到某一天，一个沉默的旅人站在你面前，既不拔剑，也不逃跑。他只是看着你，像看着一面镜子。那一刻，你突然明白了——原来你一直在等的，不是猎物，而是一个能看懂你孤独的人。`;
  MONSTER_DATA[MONSTER_KEYS[i]] = {
    name: name,
    desc: longDesc,
    tags: tag,
    emoji: ["🐉","👹","👻","🐺","🕷️","🦇","🐍","🦂","🌿","🔥","❄️","⚡","💀","👁️","🧠","🩸"][i % 16]
  };
}

// ======================= 32道经典题目 + 每道题4个不同选项 =======================
const QUESTIONS = [
  { text: "当第一滴雨落在你的额头，你会？", opts: ["伸出双手，感受雨的温度，仿佛在听它说话", "躲进最近的屋檐，静静观察雨幕", "让雨淋湿全身，无所谓，反正早已湿透", "对着雨低声说出一个秘密，希望它被带走"] },
  { text: "你如何看待这座不断生长的尖塔？", opts: ["尖塔是牢笼，必须用暴力挣脱", "尖塔是迷宫，需要耐心解构每一层", "尖塔是狩猎场，猎物和猎人角色互换", "尖塔是旧神的尸骸，藏着禁忌知识"] },
  { text: "遇到一个比你弱小的生物，你会？", opts: ["直接扑杀，不留活口，弱肉强食", "尾随它，等它放松警惕再动手", "发出威胁把它吓跑，不恋战", "放过它，也许有一天它会回报你"] },
  { text: "当你的力量被封印，你会？", opts: ["愤怒地冲击封印，直到流血", "寻找解除封印的方法，不择手段", "接受现实，用仅剩的力量活下去", "假装顺从，暗中积蓄反扑"] },
  { text: "你更相信直觉还是计算？", opts: ["直觉，因为反应快过思考", "计算，每一步都要精确", "两者结合，看情况而定", "完全随机，让命运决定"] },
  { text: "你如何看待“背叛”？", opts: ["背叛者必须死，绝不原谅", "背叛是生存常态，我会更小心", "我会先背叛，以免被背叛", "背叛让我心碎，但也让我更强"] },
  { text: "如果可以选择，你希望成为？", opts: ["成为最强大的存在，无人能敌", "成为自由的风，不受任何束缚", "成为守护者，保护重要的人", "成为影子，默默观察一切"] },
  { text: "你害怕被遗忘吗？", opts: ["害怕，所以拼命留下痕迹", "不怕，遗忘是另一种自由", "无所谓，反正我记不住别人", "我会让所有人都记住我的恐惧"] },
  { text: "你如何看待“诅咒”？", opts: ["诅咒是弱者的呻吟，无视它", "诅咒是一种力量，可以反过来利用", "我会将诅咒转嫁给敌人", "我身上早已布满诅咒，不在乎了"] },
  { text: "当同伴陷入困境，你会？", opts: ["独自冲锋，把敌人全部击倒", "指挥同伴，用战术配合解围", "假装没看见，自保最重要", "牺牲自己，换取同伴撤离"] },
  { text: "你享受追逐猎物吗？", opts: ["享受追逐的快感，慢慢玩弄", "速战速决，不给喘息机会", "设下陷阱，让猎物自投罗网", "不追逐，等待猎物自己送上门"] },
  { text: "你如何看待“规则”？", opts: ["规则是用来打破的", "规则是弱者的护盾", "我会遵守规则，然后利用它", "根本没有规则，只有力量"] },

// ======================= 权重分配：每道题给不同怪物加分 =======================
function addWeights(scoreMap, qIndex, optIndex) {
  const monsterCount = MONSTER_KEYS.length;
  const seed = (qIndex * 131 + optIndex * 253) % monsterCount;
  for (let i = 0; i < 8; i++) {
    const idx = (seed + i * 17) % monsterCount;
    scoreMap[MONSTER_KEYS[idx]] += (optIndex === 0 ? 2 : (optIndex === 3 ? 3 : 1));
  }
  if (optIndex === 0) {
    const aggressive = [0,2,4,6,8,10];
    for (let a of aggressive) if (a < monsterCount) scoreMap[MONSTER_KEYS[a]] += 1;
  } else if (optIndex === 3) {
    const tricky = [5,7,9,11,13,15];
    for (let t of tricky) if (t < monsterCount) scoreMap[MONSTER_KEYS[t]] += 1;
  }
  return scoreMap;
}

let answers = new Array(QUESTIONS.length).fill(null);
let currentIndex = 0;
let scoreMap = {};

function initScoreMap() {
  let map = {};
  for (let m of MONSTER_KEYS) map[m] = 0;
  return map;
}

function recalcAllScores() {
  scoreMap = initScoreMap();
  for (let i = 0; i < answers.length; i++) {
    if (answers[i] !== null) addWeights(scoreMap, i, answers[i]);
  }
}

function getTopMonster() {
  let maxKey = MONSTER_KEYS[0];
  let maxVal = scoreMap[maxKey];
  for (let m of MONSTER_KEYS) {
    if (scoreMap[m] > maxVal) { maxVal = scoreMap[m]; maxKey = m; }
  }
  return maxKey;
}

const coverPage = document.getElementById('coverPage');
const mainApp = document.getElementById('app');
const quizPanel = document.getElementById('quizPanel');
const resultPanel = document.getElementById('resultPanel');
const questionTextEl = document.getElementById('questionText');
const choicesContainer = document.getElementById('choicesContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressFill = document.getElementById('progressFill');
const questionCounter = document.getElementById('questionCounter');

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  progressFill.style.width = (answered / QUESTIONS.length) * 100 + '%';
  questionCounter.innerText = `${answered}/${QUESTIONS.length} 已答`;
}

function renderQuestion() {
  const q = QUESTIONS[currentIndex];
  questionTextEl.innerText = `${currentIndex+1}. ${q.text}`;
  const selectedIdx = answers[currentIndex];
  choicesContainer.innerHTML = '';
  q.opts.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'choice' + (selectedIdx === idx ? ' active' : '');
    div.innerText = opt;
    div.addEventListener('click', () => {
      answers[currentIndex] = idx;
      recalcAllScores();
      renderQuestion();
      updateProgress();
    });
    choicesContainer.appendChild(div);
  });
  updateProgress();
  prevBtn.disabled = (currentIndex === 0);
  nextBtn.innerText = (currentIndex === QUESTIONS.length-1) ? "✨ 浮现真身" : "下一本能 →";
}

function showResult() {
  for (let i=0; i<answers.length; i++) {
    if (answers[i] === null) {
      alert(`请先完成第 ${i+1} 题再窥视雨中影子`);
      currentIndex = i;
      renderQuestion();
      return;
    }
  }
  recalcAllScores();
  const monsterKey = getTopMonster();
  const data = MONSTER_DATA[monsterKey];
  if (!data) { console.error("缺失数据", monsterKey); return; }
  document.getElementById('resultTypeCode').innerHTML = "尖塔幽影 · " + monsterKey.substring(1);
  document.getElementById('resultName').innerHTML = data.name;
  document.getElementById('resultDesc').innerHTML = data.desc;
  document.getElementById('resultTags').innerHTML = data.tags.split('·').map(t => `<span class="tag">${t.trim()}</span>`).join('');
  document.getElementById('resultMonsterImg').innerHTML = `<div>${data.emoji}</div>`;
  quizPanel.style.display = 'none';
  resultPanel.style.display = 'block';
}

function resetTest() {
  answers.fill(null);
  currentIndex = 0;
  scoreMap = initScoreMap();
  quizPanel.style.display = 'block';
  resultPanel.style.display = 'none';
  renderQuestion();
}

function bindEvents() {
  nextBtn.addEventListener('click', () => {
    if (answers[currentIndex] === null) { alert("请先选择一项"); return; }
    if (currentIndex === QUESTIONS.length-1) {
      if (answers.every(v => v !== null)) showResult();
      else alert("还有未答的题目");
    } else {
      currentIndex++;
      renderQuestion();
    }
  });
  prevBtn.addEventListener('click', () => {
    if (currentIndex > 0) { currentIndex--; renderQuestion(); }
  });
  document.getElementById('restartTestBtn').addEventListener('click', resetTest);
  document.getElementById('startTestBtn').addEventListener('click', () => {
    coverPage.style.display = 'none';
    mainApp.style.display = 'block';
    resetTest();
  });
}

bindEvents();
renderQuestion();
</script>
