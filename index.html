<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
body{background:#f5f7fa;padding:20px;color:#2d3748}
.main{max-width:720px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.08);overflow:hidden}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:32px 24px;text-align:center}
.header h1{font-size:26px;margin-bottom:8px}
.header p{font-size:15px;opacity:.95}
.progress-bar{height:6px;background:#edf2f7}
.progress-fill{height:100%;background:#667eea;width:0%;transition:.4s ease}
.question-box{padding:32px 24px}
.question-title{font-size:20px;line-height:1.6;margin-bottom:28px;color:#2d3748}
.choices{display:grid;gap:12px}
.choice{padding:14px 18px;border:1px solid #e2e8f0;border-radius:12px;cursor:pointer;transition:.2s;background:#f8fafc}
.choice:hover{border-color:#667eea;background:#edf2ff}
.choice.active{border-color:#667eea;background:#e6e9ff;color:#553c9a;font-weight:500}
.nav{padding:0 24px 32px;display:flex;gap:12px}
button{padding:14px 24px;border:none;border-radius:12px;font-size:16px;cursor:pointer;flex:1;font-weight:500}
.btn-next{background:#667eea;color:#fff}
.btn-back{background:#e2e8f0;color:#2d3748}
.btn-submit{background:#764ba2;color:#fff}
.result-page{display:none;padding:32px 24px}
.result-type{font-size:36px;font-weight:bold;color:#553c9a;margin-bottom:12px}
.result-name{font-size:22px;margin-bottom:20px;color:#2d3748}
.dimensions{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:24px 0}
.dimension{background:#f8fafc;padding:16px;border-radius:12px}
.dim-title{font-weight:600;color:#553c9a;margin-bottom:8px}
.dim-score{font-size:14px;color:#4a5568}
.result-desc{line-height:1.8;font-size:16px;color:#4a5568;margin-top:20px}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
.tag{padding:6px 14px;background:#edf2f7;border-radius:20px;font-size:14px;color:#4a5568}
.count{text-align:center;color:#718096;margin-bottom:16px;font-size:14px}
</style>
</head>
<body>

  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

  <div class="question-box" id="qbox">

  </div>

  <div class="nav">

    <div class="tags" id="rTags"></div>
    <div class="dimensions" id="rDims"></div>

// 维度配置
const dimConfig = {
  as: {name:"依恋类型", a:"焦虑型(A)", s:"安全型(S)"},
  df: {name:"自我认知", d:"低自尊(D)", f:"高自尊(F)"},
  gh: {name:"现实程度", g:"理想主义(G)", h:"现实主义(H)"},
  jk: {name:"自律程度", j:"自律型(J)", k:"随性型(K)"}
};

let current = 0
let answers = Array(questions.length).fill(null)
let score = {a:0,s:0,d:0,f:0,g:0,h:0,j:0,k:0}

const el = (id)=>document.getElementById(id)
function render(){
  const q = questions[current]
  el("title").innerText = `${current+1}. ${q.q}`
  el("count").innerText = `${current+1}/${questions.length}`
  el("progress").style.width = (current+1)/questions.length*100 + '%'
  const c = el("choices")
  c.innerHTML = ''
  q.a.forEach((opt,i)=>{
    let div = document.createElement('div')
    div.className = 'choice'
    if(answers[current] === i) div.classList.add('active')
    div.innerText = opt.t
    div.onclick = ()=>{
      answers[current] = i
      render()
    }
    c.appendChild(div)
  })
  el("back").disabled = current === 0
  el("next").innerText = current === questions.length-1 ? "提交测试" : "下一题"
}

el("next").onclick = ()=>{
  if(answers[current]==null)return alert("请选择一个选项")
  const opt = questions[current].a[answers[current]]
  for(let k in opt){
    if(k!='t')score[k]+=opt[k]
  }
  if(current < questions.length-1){
    current++
    render()
  }else{
    calc()
    el("qbox").style.display = "none"
    el("result").style.display = "block"
    document.querySelector(".nav").style.display = "none"
  }
}
el("back").onclick = ()=>{
  if(current>0){
    // 回退时撤销上一题的分数
    const lastOpt = questions[current-1].a[answers[current-1]]
    for(let k in lastOpt){
      if(k!='t')score[k]-=lastOpt[k]
    }
    current--
    render()
  }
}

function calc(){
  // 计算每个维度的最终字母
  let as = score.a > score.s ? 'A' : 'S'
  let df = score.d > score.f ? 'D' : 'F'
  let gh = score.g > score.h ? 'G' : 'H'
  let jk = score.j > score.k ? 'J' : 'K'
  let type = as + df + gh + jk

  // 生成维度展示
  const dims = [
    {name:dimConfig.as.name, res:as === 'A' ? dimConfig.as.a : dimConfig.as.s, score:`A:${score.a} / S:${score.s}`},
    {name:dimConfig.df.name, res:df === 'D' ? dimConfig.df.d : dimConfig.df.f, score:`D:${score.d} / F:${score.f}`},
    {name:dimConfig.gh.name, res:gh === 'G' ? dimConfig.gh.g : dimConfig.gh.h, score:`G:${score.g} / H:${score.h}`},
    {name:dimConfig.jk.name, res:jk === 'J' ? dimConfig.jk.j : dimConfig.jk.k, score:`J:${score.j} / K:${score.k}`}
  ]
  let dimHtml = ''
  dims.forEach(d=>{
    dimHtml += `
    <div class="dimension">
      <div class="dim-title">${d.name}：${d.res}</div>
      <div class="dim-score">${d.score}</div>
    </div>`
  })
  el("rDims").innerHTML = dimHtml

  // 匹配结果
  let res = resultData[type] || resultData[as+df+gh] || resultData[as+df] || resultData.SFHK
  el("rType").innerText = type
  el("rName").innerText = res.name
  el("rDesc").innerText = res.desc
  let tags = res.tags.split(',').map(t=>`<span class="tag">${t}</span>`).join('')
  el("rTags").innerHTML = tags
}

render()
</script>
</body>
</html>
